<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SF Inspect">
<meta name="theme-color" content="#080c14">
<title>SF Field Inspection</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c14;--surface:#0f1520;--surface2:#161e2e;--surface3:#1c2438;
  --border:#1e2d45;--border2:#243550;
  --accent:#00d4ff;--accent2:#7c5cfc;--accent3:#ff6b35;
  --green:#00e5a0;--amber:#ffb340;--red:#ff4566;
  --text:#e8eef8;--muted:#5a7090;--muted2:#8090b0;
  --font:'DM Sans',sans-serif;--display:'Syne',sans-serif;--mono:'DM Mono',monospace;
  --r:12px;--r2:16px;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--text)}
#app{height:100%;display:flex;flex-direction:column;max-width:500px;margin:0 auto;position:relative}

/* ── HEADER ── */
.hdr{background:linear-gradient(180deg,#0d1525 0%,#080c14 100%);border-bottom:1px solid var(--border);padding:max(env(safe-area-inset-top),14px) 18px 12px;flex-shrink:0;position:relative;z-index:50}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hdr h1{font-family:var(--display);font-size:14px;font-weight:700;letter-spacing:.02em}
.hdr .sub{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:1px}
.hdr-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer;font-family:var(--font);white-space:nowrap}
.prog-bar{height:2px;background:var(--border);margin-top:10px;border-radius:1px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:1px;transition:width .5s ease}

/* ── SCREEN NAV ── */
.screen-nav{display:flex;gap:4px;overflow-x:auto;padding:10px 18px 0;scrollbar-width:none;flex-shrink:0;background:var(--bg)}
.screen-nav::-webkit-scrollbar{display:none}
.snav-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:20px;font-size:10px;white-space:nowrap;cursor:pointer;font-family:var(--font);flex-shrink:0;display:flex;align-items:center;gap:4px;transition:all .15s}
.snav-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.snav-btn.done{border-color:var(--green);color:var(--green)}
.snav-btn .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.6}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pad{padding:16px 18px}

/* ── SETUP SCREEN ── */
.hero{text-align:center;padding:24px 0 20px}
.hero .logo{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px;box-shadow:0 0 40px rgba(0,212,255,.2)}
.hero h2{font-family:var(--display);font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--muted2);font-size:13px;margin-top:6px}

/* ── FORM ELEMENTS ── */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.section-card h3{font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.field-row{margin-bottom:12px}
.field-row:last-child{margin-bottom:0}
.field-lbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.field-inp{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:10px;font-size:15px;font-family:var(--font);outline:none;-webkit-appearance:none}
.field-inp:focus{border-color:var(--accent)}
.field-inp::placeholder{color:var(--muted)}
.field-sel{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:10px;font-size:14px;font-family:var(--font);outline:none;-webkit-appearance:none;cursor:pointer}
.field-ta{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:10px;font-size:14px;font-family:var(--font);resize:none;outline:none;line-height:1.5;-webkit-appearance:none}
.field-ta:focus,.field-sel:focus{border-color:var(--accent)}
.field-ta::placeholder{color:var(--muted)}

/* ── CHIP SELECTORS ── */
.chip-grid{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);padding:7px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap}
.chip.sel{background:rgba(0,212,255,.12);border-color:var(--accent);color:var(--accent);font-weight:600}
.chip.sel2{background:rgba(124,92,252,.12);border-color:var(--accent2);color:var(--accent2);font-weight:600}
.chip.sel3{background:rgba(0,229,160,.12);border-color:var(--green);color:var(--green);font-weight:600}
.chip-2col{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.yn-row{display:flex;gap:8px}
.yn-btn{flex:1;background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);padding:10px;border-radius:10px;font-size:13px;cursor:pointer;font-family:var(--font);text-align:center;transition:all .15s;font-weight:500}
.yn-btn.yes{background:rgba(0,229,160,.12);border-color:var(--green);color:var(--green)}
.yn-btn.no{background:rgba(255,69,102,.1);border-color:var(--red);color:var(--red)}

/* ── ACTION BUTTONS ── */
.btn-primary{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border:none;padding:15px;border-radius:var(--r2);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--display);letter-spacing:.02em}
.btn-primary:disabled{opacity:.3}
.btn-secondary{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:13px;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-green{background:linear-gradient(135deg,#059669,#047857);border:none;color:white}
.btn-blue{background:linear-gradient(135deg,var(--accent),#0099cc);border:none;color:#000;font-weight:700}

/* ── PHOTO ITEMS ── */
.photo-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.photo-item.done{border-color:rgba(0,229,160,.3)}
.photo-item.req{border-left:3px solid var(--amber)}
.photo-item.req.done{border-left:3px solid var(--green)}
.photo-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.photo-chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all .2s}
.photo-chk.done{background:var(--green);border-color:var(--green);color:#000}
.photo-info{flex:1}
.photo-lbl{font-size:13px;font-weight:500}
.req-tag{background:rgba(255,179,64,.15);color:var(--amber);font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:6px;text-transform:uppercase;letter-spacing:.05em}
.photo-hint{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.photo-cnt{font-size:11px;color:var(--muted);font-family:var(--mono);flex-shrink:0}
.photo-body{padding:0 14px 14px;border-top:1px solid var(--border)}
.thumbs{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 8px}
.thumb{position:relative;width:68px;height:68px;border-radius:8px;overflow:hidden;background:var(--surface2);border:1px solid var(--border2)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb-x{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.75);border:none;color:white;width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
.cam-row{display:flex;gap:8px;margin-top:8px}
.cam-btn{flex:1;background:var(--surface2);border:1px dashed var(--border2);color:var(--muted2);padding:11px;border-radius:10px;font-size:12px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px}
.cam-btn.pri{background:rgba(0,212,255,.08);border-color:var(--accent);color:var(--accent)}
.note-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-top:10px;margin-bottom:4px}

/* ── COMPASS ── */
.compass-wrap{background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:10px}
.compass-title{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:700;margin-bottom:10px}
.compass-dial{width:100px;height:100px;margin:0 auto 10px;position:relative}
.compass-ring{width:100%;height:100%;border-radius:50%;border:2px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;position:relative}
.compass-needle{position:absolute;width:4px;height:40px;top:50%;left:50%;transform-origin:bottom center;transform:translateX(-50%) translateY(-100%)}
.needle-n{width:100%;height:50%;background:var(--red);border-radius:2px 2px 0 0}
.needle-s{width:100%;height:50%;background:var(--muted);border-radius:0 0 2px 2px}
.compass-n{position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:var(--red);font-family:var(--mono)}
.compass-dirs{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dir-btn{background:var(--surface);border:2px solid var(--border2);color:var(--muted2);padding:10px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--display);text-align:center;transition:all .15s}
.dir-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.1)}
.compass-result{text-align:center;font-size:12px;color:var(--muted2);margin-top:8px;line-height:1.5}
.compass-result strong{color:var(--accent)}

/* ── UNIT CARDS ── */
.unit-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);margin-bottom:10px;overflow:hidden}
.unit-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.unit-badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700;font-family:var(--mono)}
.badge-occ{background:rgba(0,229,160,.15);color:var(--green)}
.badge-vac{background:rgba(0,212,255,.15);color:var(--accent)}
.badge-down{background:rgba(255,69,102,.15);color:var(--red)}
.unit-body{padding:0 14px 14px;border-top:1px solid var(--border)}
.unit-num{font-family:var(--display);font-size:15px;font-weight:700}
.unit-cond{font-size:11px;color:var(--muted);margin-top:2px}
.add-unit-btn{width:100%;background:var(--surface);border:2px dashed var(--border2);color:var(--accent);padding:14px;border-radius:var(--r2);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--display);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}

/* ── RATING STARS ── */
.rating-row{display:flex;gap:6px;margin-top:6px}
.rating-btn{flex:1;background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);padding:8px 4px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--mono);text-align:center;transition:all .15s}
.rating-btn.r1{}.rating-btn.r2{}.rating-btn.r3{}.rating-btn.r4{}.rating-btn.r5{}
.rating-btn.sel-r{background:rgba(0,212,255,.15);border-color:var(--accent);color:var(--accent)}

/* ── SECTION TABS ── */
.sec-tabs{display:flex;gap:5px;overflow-x:auto;padding:0 0 2px;scrollbar-width:none;margin-bottom:14px}
.sec-tabs::-webkit-scrollbar{display:none}
.sec-tab{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:20px;font-size:11px;white-space:nowrap;cursor:pointer;font-family:var(--font);flex-shrink:0;transition:all .15s}
.sec-tab.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.sec-tab.done{border-color:var(--green);color:var(--green)}
.sec-tab .cnt{background:rgba(255,255,255,.2);border-radius:8px;padding:1px 5px;margin-left:3px;font-size:9px}
.sec-tab.done .cnt{background:rgba(0,229,160,.2)}

/* ── BANK BANNER ── */
.bank-note{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.15);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:#90c8d8;line-height:1.6}
.bank-note strong{color:var(--accent)}

/* ── SUMMARY ── */
.sum-hero{text-align:center;padding:20px 0 16px}
.sum-hero .icon{font-size:52px;margin-bottom:8px}
.sum-hero h2{font-family:var(--display);font-size:22px;font-weight:800}
.sum-hero p{color:var(--muted2);font-size:13px;margin-top:4px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px}
.stat-card h3{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;font-weight:700}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-lbl{font-size:13px}
.stat-val{font-size:13px;font-family:var(--mono);color:var(--accent)}
.stat-val.ok{color:var(--green)}
.stat-val.warn{color:var(--amber)}
.miss-item{font-size:12px;color:var(--amber);padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.miss-item:last-child{border-bottom:none}

/* Folder preview */
.folder-tree{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px}
.folder-tree h3{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;font-weight:700}
.ftree-root{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ftree-child{font-size:12px;color:var(--muted2);padding:4px 0 4px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ftree-child:last-child{border-bottom:none}
.ftree-badge{background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:10px;padding:1px 6px;font-family:var(--mono);color:var(--accent)}

/* Drive status */
.drive-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;font-size:12px}
.drive-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.drive-dot.on{background:var(--green)}
.drive-dot.off{background:var(--muted)}
.drive-dot.spin{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Upload steps */
.up-steps{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.up-steps h3{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;font-weight:700}
.up-step{font-size:12px;padding:4px 0;display:flex;align-items:center;gap:8px;color:var(--muted)}
.up-step.done{color:var(--green)}
.up-step.active{color:var(--amber)}

/* Toast */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:11px 20px;border-radius:12px;font-size:13px;z-index:999;max-width:88vw;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

/* Modal overlay */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2) var(--r2) 0 0;padding:20px 18px max(env(safe-area-inset-bottom),20px);width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-family:var(--display);font-size:18px;font-weight:800;margin-bottom:16px}
.modal-close{float:right;background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}

.hidden{display:none}
/* ── DAILY DASHBOARD ── */
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dash-title{font-family:var(--display);font-size:18px;font-weight:800}
.dash-date{font-size:11px;color:var(--muted);font-family:var(--mono)}
.assign-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:10px;overflow:hidden}
.assign-card.done{border-color:rgba(0,229,160,.3);opacity:.7}
.assign-top{padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.assign-status{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px}
.assign-status.done{background:var(--green);border-color:var(--green);color:#000}
.assign-status.inprog{background:var(--amber);border-color:var(--amber);color:#000}
.assign-info{flex:1;min-width:0}
.assign-addr{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.assign-bank{font-size:11px;color:var(--muted);margin-top:2px}
.assign-contact{font-size:11px;color:var(--muted2);margin-top:2px}
.assign-actions{display:flex;gap:6px;padding:0 14px 12px}
.act-btn{flex:1;padding:9px 6px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);border:1px solid var(--border2);background:var(--surface2);color:var(--muted2);display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.act-btn.call{border-color:var(--green);color:var(--green);background:rgba(0,229,160,.08)}
.act-btn.text{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.08)}
.act-btn.start{border-color:var(--accent2);color:var(--accent2);background:rgba(124,92,252,.08)}
.act-btn.edit{border-color:var(--border2);color:var(--muted)}
/* Swipe to dismiss */
.swipe-wrap{position:relative;overflow:hidden;border-radius:var(--r2);margin-bottom:10px}
.swipe-card{position:relative;transition:transform .25s ease;touch-action:pan-y;cursor:grab}
.swipe-card.swiping{transition:none}
.swipe-bg{position:absolute;inset:0;background:var(--red);border-radius:var(--r2);display:flex;align-items:center;justify-content:flex-end;padding-right:20px;color:white;font-size:13px;font-weight:700;opacity:0;transition:opacity .2s}
.swipe-bg.visible{opacity:1}
.swipe-hint{font-size:10px;color:var(--muted);text-align:center;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:4px}

/* Calendar pill */
.cal-pill{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);border-radius:8px;padding:6px 12px;font-size:11px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;cursor:pointer;margin-bottom:12px}
.cal-pill.linked{background:rgba(0,229,160,.08);border-color:rgba(0,229,160,.2);color:var(--green)}
/* Calendar picker modal */
.cal-list{max-height:300px;overflow-y:auto}
.cal-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.cal-item:last-child{border-bottom:none}
.cal-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.cal-item-name{font-size:13px;font-weight:500}

const WALL_FROM_STANDING={N:'South',S:'North',E:'West',W:'East'};
const STAND_DIR={N:'South Wall',S:'North Wall',E:'West Wall',W:'East Wall'};

function startCompass(){
  if(!window.DeviceOrientationEvent)return;
  if(typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(r=>{if(r==='granted')listenCompass();}).catch(()=>{});
  } else {listenCompass();}
}
function listenCompass(){
  window.addEventListener('deviceorientationabsolute',handleOrient,true);
  window.addEventListener('deviceorientation',handleOrient,true);
  compassActive=true;
}
function handleOrient(e){
  let h=e.alpha||0;
  if(e.webkitCompassHeading) h=e.webkitCompassHeading;
  compassHeading=Math.round(h);
  const needle=document.getElementById('compass-needle');
  if(needle) needle.style.transform=`translateX(-50%) translateY(-100%) rotate(${h}deg)`;
  updateCompassResult();
}
function updateCompassResult(){
  const el=document.getElementById('compass-result-text');
  if(!el)return;
  const btn=document.querySelector('.dir-btn.active');
  if(!btn)return;
  const standing=btn.dataset.dir;
  const wall=STAND_DIR[standing]||'';
  el.innerHTML=`You are on the <strong>${standing} side</strong> → photographing the <strong>${wall}</strong>`;
}

function saveAssignments(arr){

}
function deleteAssignment(id){
  const all = getAssignments().filter(a=>a.id!==id);
  saveAssignments(all);
  render();
}
function markAssignmentDone(id){
  const all = getAssignments();
  const a = all.find(x=>x.id===id);
  if(a) a.status = a.status==='done'?'pending':'done';
  saveAssignments(all);
  render();
}

function textContact(phone, name, addr){
  if(!phone){toast('No phone number','err');return;}
  const msg=encodeURIComponent(`Hi ${name||'there'}, this is your inspector from Spectrum Field Services. I am on my way for today's inspection at ${addr||'your property'}. I will arrive shortly. Please ensure access is available. Thank you!`);
  window.location.href='sms:'+phone.replace(/\D/g,'')+'?body='+msg;
}

  const idx=all.findIndex(x=>x.id===a.id);
  if(idx>=0){all[idx].status='inprog';saveAssignments(all);}
  goScreen('facts');
}

function bindUnitModal(){
  document.querySelectorAll('[data-ultype]').forEach(b=>b.addEventListener('click',()=>{
    window._uTemp.labelType=b.dataset.ultype;
    document.querySelectorAll('[data-ultype]').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
  }));
  document.querySelectorAll('[data-ustatus]').forEach(b=>b.addEventListener('click',()=>{
    window._uTemp.status=b.dataset.ustatus;
    document.querySelectorAll('[data-ustatus]').forEach(x=>x.classList.remove('sel3'));
    b.classList.add('sel3');
  }));
  document.querySelectorAll('[data-utype]').forEach(b=>b.addEventListener('click',()=>{
    window._uTemp.type=b.dataset.utype;
    document.querySelectorAll('[data-utype]').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
  }));
  document.querySelectorAll('[data-ubaths]').forEach(b=>b.addEventListener('click',()=>{
    window._uTemp.baths=b.dataset.ubaths;
    document.querySelectorAll('[data-ubaths]').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
  }));
  document.querySelectorAll('[data-ucond]').forEach(b=>b.addEventListener('click',()=>{
    window._uTemp.condition=b.dataset.ucond;
    document.querySelectorAll('[data-ucond]').forEach(x=>x.classList.remove('sel-r'));
    b.classList.add('sel-r');
  }));
  document.querySelectorAll('[data-ucheck]').forEach(b=>b.addEventListener('click',()=>{
    const k=b.dataset.ucheck;
    if(window._uTemp.checks.includes(k)) window._uTemp.checks=window._uTemp.checks.filter(x=>x!==k);
    else window._uTemp.checks.push(k);
    b.classList.toggle('sel3');
  }));
  document.getElementById('save-unit-btn').addEventListener('click',()=>{
    const lbl=document.getElementById('um-label').value.trim();
    const notes=document.getElementById('um-notes').value;
    const unit={...window._uTemp,label:lbl,notes};
    if(editingUnit>=0) S.units[editingUnit]=unit;
    else S.units.push(unit);
    closeUnitModal();
    render();
  });
  const del=document.getElementById('del-unit-btn');
  if(del) del.addEventListener('click',()=>{S.units.splice(editingUnit,1);closeUnitModal();render();});
}

function closeUnitModal(){
  document.getElementById('unit-modal').classList.add('hidden');
  editingUnit=null;
}

function handlePhotos(files){
  if(!files.length||!pendingItemId)return;
  const id=pendingItemId;
  if(!S.photoData[id])S.photoData[id]={photos:[],note:''};
  Array.from(files).forEach(f=>{S.photoData[id].photos.push({id:Date.now()+''+Math.random(),url:URL.createObjectURL(f),name:f.name});});
  S.expandedItem=id; render();
}

// ── DRIVE UPLOAD ───────────────────────────────────────────────────────────
async function driveFolder(name,parentId){
  const b={name,mimeType:'application/vnd.google-apps.folder'};
  if(parentId)b.parents=[parentId];
  const r=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{'Authorization':'Bearer '+gToken,'Content-Type':'application/json'},body:JSON.stringify(b)});
  const d=await r.json(); if(!d.id)throw new Error('Folder create failed: '+name); return d.id;
}
async function driveFile(name,blob,parentId){
  const m=JSON.stringify({name,parents:[parentId]});
  const f=new FormData();
  f.append('metadata',new Blob([m],{type:'application/json'}));
  f.append('file',blob);
  return fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{'Authorization':'Bearer '+gToken},body:f});
}

async function uploadToDrive(){
  if(!gToken){signIn();return;}
  if(isUploading)return;
  isUploading=true;
  uploadSteps=[
    {label:'Creating property folder',status:'active'},
    {label:'Creating subfolders',status:'pending'},
    {label:'Uploading inspection report',status:'pending'},
    {label:'Uploading photos',status:'pending'},
    {label:'Uploading unit reports',status:'pending'},
  ];
  render();
  try{
    const dateStr=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const rootName=`${S.address||'Inspection'} – ${dateStr}`;
    setStep(0,'active');
    const rootId=await driveFolder(rootName,null);
    setStep(0,'done');
    setStep(1,'active');
    const subs={};
    for(const n of['1. Exterior','2. Interior','3. Deferred Maintenance','4. Units Inspected'])
      subs[n]=await driveFolder(n,rootId);
    setStep(1,'done');
    setStep(2,'active');
    await driveFile(`inspection-report-${(S.address||'property').replace(/\s+/g,'-').toLowerCase()}.txt`,new Blob([buildReport()],{type:'text/plain'}),rootId);
    setStep(2,'done');
    setStep(3,'active');
    let pc=0;const tp=totalPhotos();
    for(const sid of S.sections){
      const fn=FOLDER_MAP[sid]||'1. Exterior';
      for(const item of cl()?.sections[sid]||[]){
        for(let pi=0;pi<(S.photoData[item.id]?.photos||[]).length;pi++){
          pc++;uploadSteps[3].label=`Uploading photos (${pc}/${tp})`;render();
          try{const resp=await fetch(S.photoData[item.id].photos[pi].url);const blob=await resp.blob();const ext=blob.type.includes('png')?'png':'jpg';await driveFile(`${item.label.replace(/[^a-z0-9]/gi,'-').toLowerCase()}-${pi+1}.${ext}`,blob,subs[fn]);}catch(e){console.warn(e);}
        }
      }
    }
    setStep(3,'done');
    setStep(4,'active');
    if(S.units.length>0){
      const unitReport=buildUnitReport();
      await driveFile('units-inspected.txt',new Blob([unitReport],{type:'text/plain'}),subs['4. Units Inspected']);
    }
    setStep(4,'done');
    S.driveLink=`https://drive.google.com/drive/folders/${rootId}`;
    saveInspectionToHistory();
    toast(`✅ Uploaded to Drive: "${rootName}"`, 'ok');
    // Auto-update ClickUp task with Drive link if task already created
    if(S.cuTaskId) updateClickUpWithDriveLink();
  }catch(e){console.error(e);toast('Upload failed: '+e.message,'err');}
  finally{isUploading=false;render();}
}

function setStep(i,s){uploadSteps[i].status=s;if(s==='done'&&uploadSteps[i+1])uploadSteps[i+1].status='active';render();}

    `Occupancy %: ${S.occupancyPct}%`,`Sq Ft: ${S.sqFt}`,`Parking: ${S.numParking}`,
    `Roof Accessible: ${S.roofAccess}`,`Elevator: ${S.elevator}`,`Sprinkler: ${S.sprinkler}`,
    `Amenities: ${S.amenities}`,`Area Distressed: ${S.areaDistressed}`,`New Construction: ${S.newConstruction}`,
    `Neighborhood: ${S.neighborhood}`,'',

    `Accompanied By: ${S.accompanied} ${S.accompaniedPhone}`,
    `Management Co: ${S.mgmtCompany}`,`Interviewee: ${S.mgmtContact} (${S.mgmtTitle}) ${S.mgmtPhone}`,
    `Email: ${S.mgmtEmail}`,`Length at Property: ${S.mgmtLength}`,`Management Change: ${S.mgmtChange}`,
    `Heat: ${S.heatPaidBy}`,`Water: ${S.waterPaidBy}`,`Electric: ${S.electricPaidBy}`,
    `Gas: ${S.gasPaidBy}`,`Trash: ${S.trashPaidBy}`,`Cable: ${S.cablePaidBy}`,
    `Fire/Damage: ${S.fireDamage}${S.fireDamageDetails?' — '+S.fireDamageDetails:''}`,
    `Code Violations: ${S.codeViolations}${S.codeDetails?' — '+S.codeDetails:''}`,
  ];
  if(S.bank==='santander'){
    lines.push('','── LIMITATIONS ──',
      `Mgmt unavailable: ${S.limMgmtUnavail}`,`Mgmt exp <6mo: ${S.limMgmtExp}`,
      `Units unavailable: ${S.limUnitsUnavail}`,`Common areas unavail: ${S.limCommonUnavail}`,
      `Snow: ${S.limSnow}`,`Other: ${S.limOther}`,`Comment: ${S.limComment}`);
  }
  lines.push('','── PHYSICAL CONDITION ──',
    `Overall Rating: ${S.overallRating} — ${S.overallComment}`,
    `Site: ${S.condSite} (${S.condSiteTrend}) — ${S.condSiteNote}`,
    `Mechanical: ${S.condMech} (${S.condMechTrend}) — ${S.condMechNote}`,
    `Exteriors: ${S.condExt} (${S.condExtTrend}) — ${S.condExtNote}`,
    `Roof: ${S.condRoof} (${S.condRoofTrend}) — ${S.condRoofNote}`,
    `Occupied Units: ${S.condOccUnit} (${S.condOccUnitTrend}) — ${S.condOccUnitNote}`,
    `Vacant Units: ${S.condVacUnit} (${S.condVacUnitTrend}) — ${S.condVacUnitNote}`,
    `Common Areas: ${S.condCommon} (${S.condCommonTrend}) — ${S.condCommonNote}`,
    `Amenities: ${S.condAmen} (${S.condAmenTrend}) — ${S.condAmenNote}`,
    `Environmental: ${S.condEnv} (${S.condEnvTrend}) — ${S.condEnvNote}`);
  if(S.bank==='santander'){
    lines.push('','── CRITICAL ITEMS ──',
      `Violent Crime: ${S.critCrime}`,`Insurance Loss: ${S.critInsurance}`,
      `Life Safety: ${S.critLifeSafety}`,`Down Units: ${S.critDownUnits}`,
      `Code Violations: ${S.critCodeViol}`,`Comment: ${S.critComment}`);
  }
  lines.push('','── PHOTOS ──');
  S.sections.forEach(sid=>{
    const lbl=(SECTION_TYPES.find(s=>s.id===sid)||{}).label||sid;
    lines.push(`\n${lbl.toUpperCase()}`);
    (cl()?.sections[sid]||[]).forEach(item=>{

}

function buildUnitReport(){
  const lines=['UNITS INSPECTED','='.repeat(40),''];
  S.units.forEach((u,i)=>{
    lines.push(`Unit ${i+1}: ${u.label||u.unitNum||'Unknown'}`);
    lines.push(`  Status: ${u.status}`,`  Type: ${u.type}`,`  Bathrooms: ${u.baths}`,`  Condition: ${u.condition}`);
    if(u.checks&&u.checks.length) lines.push(`  Checklist: ${u.checks.join(', ')}`);
    if(u.notes) lines.push(`  Notes: ${u.notes}`);
    lines.push('');
  });
  return lines.join('\n');
}

async function fetchCalendars(){
  if(!gToken){signIn();return;}
  try{
    const res = await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList',{
      headers:{'Authorization':'Bearer '+gToken}
    });
    const data = await res.json();
    return data.items||[];
  }catch(e){console.error(e);return [];}
}

async function fetchTodayEvents(){
  if(!gToken||!calendarId) return [];
  try{
    const now = new Date();
    const start = new Date(now.getFullYear(),now.getMonth(),now.getDate(),0,0,0).toISOString();
    const end = new Date(now.getFullYear(),now.getMonth(),now.getDate(),23,59,59).toISOString();
    const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events?timeMin=${start}&timeMax=${end}&singleEvents=true&orderBy=startTime`;
    const res = await fetch(url,{headers:{'Authorization':'Bearer '+gToken}});
    const data = await res.json();
    return data.items||[];
  }catch(e){console.error(e);return [];}
}

function parseEventToAssignment(evt){
  // Parse title: "123 Main St – NCB" or just "123 Main St"
  const title = evt.summary||'';
  const dashIdx = title.lastIndexOf('–');
  const address = dashIdx>0 ? title.slice(0,dashIdx).trim() : title.trim();

  // Parse description for contact info
  const desc = evt.description||'';
  const getField = (label) => {
    const regex = new RegExp(label+':\s*(.+)', 'i');
    const m = desc.match(regex);
    return m ? m[1].trim() : '';
  };

  // Detect bank from title or description
  const bankHints = {ncb:'ncb',mt:'m&t',santander:'santander',wells:'wells',habib:'habib'};
  let bank = getField('bank').toLowerCase() || '';
  if(!bank){
    const titleLow = title.toLowerCase();
    for(const [k,v] of Object.entries(bankHints)){
      if(titleLow.includes(k)||titleLow.includes(v)){bank=k;break;}
    }
  }
  // Normalize bank id
  const bankMap={'ncb':'ncb','national cooperative':'ncb','national co-op':'ncb',
    'mt':'mt','m&t':'mt','santander':'santander','wells':'wells','wells fargo':'wells',
    'habib':'habib','habib bank':'habib'};
  bank = bankMap[bank] || bank || null;

  // Parse sections
  const secRaw = getField('sections').toLowerCase();
  const secMap = {exterior:'exterior',interior:'interior',deferred:'deferred',
    'deferred maintenance':'deferred',commercial:'commercial',occupied:'occupied',vacant:'vacant'};
  const sections = secRaw ? secRaw.split(',').map(s=>{
    const t=s.trim();
    for(const [k,v] of Object.entries(secMap)) if(t.includes(k)) return v;
    return null;
  }).filter(Boolean) : [];

  const startTime = evt.start?.dateTime || evt.start?.date || '';
  const timeStr = startTime ? new Date(startTime).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';

  return {
    id: 'cal_'+evt.id,
    rawTitle: title,
    address, city: getField('city'), state: getField('state'),
    propName: getField('property name')||getField('property'),
    bank, sections,
    contactName: getField('contact'), contactPhone: getField('phone'),
    contactEmail: getField('email'),
    time: timeStr, source: 'calendar', status: 'pending',
    calEventId: evt.id
  };
}

// ── SWIPE TO DISMISS ──────────────────────────────────────────────────────
function initSwipeCards(){
  document.querySelectorAll('[data-swipe-id]').forEach(card=>{
    const id = card.dataset.swipeId;
    const bg = document.getElementById('sbg-'+id);
    let startX=0, currentX=0, isSwiping=false;
    const DISMISS_THRESHOLD = 100;

    function onStart(x){
      startX=x; currentX=0; isSwiping=true;
      card.classList.add('swiping');
    }
    function onMove(x){
      if(!isSwiping) return;
      currentX = Math.min(0, x - startX); // only left swipe
      card.style.transform = `translateX(${currentX}px)`;
      const pct = Math.min(1, Math.abs(currentX)/DISMISS_THRESHOLD);
      if(bg){ bg.style.opacity=pct; bg.classList.toggle('visible', pct>0.3); }
    }
    function onEnd(){
      if(!isSwiping) return;
      isSwiping=false;
      card.classList.remove('swiping');
      if(Math.abs(currentX) >= DISMISS_THRESHOLD){
        // Dismiss it
        card.style.transform = `translateX(-110%)`;
        card.style.opacity = '0';
        card.style.transition = 'transform .3s ease, opacity .3s ease';
        setTimeout(()=>dismissCalEvent(id), 300);
      } else {
        // Snap back
        card.style.transform = '';
        if(bg){ bg.style.opacity='0'; bg.classList.remove('visible'); }
      }
      currentX=0;
    }

    // Touch events
    card.addEventListener('touchstart',e=>onStart(e.touches[0].clientX),{passive:true});
    card.addEventListener('touchmove',e=>onMove(e.touches[0].clientX),{passive:true});
    card.addEventListener('touchend',onEnd);
    // Mouse events (desktop testing)
    card.addEventListener('mousedown',e=>{onStart(e.clientX);
      const mm=ev=>onMove(ev.clientX);
      const mu=()=>{onEnd();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
      document.addEventListener('mousemove',mm);
      document.addEventListener('mouseup',mu);
    });
  });
}

function dismissCalEvent(id){
  try{
    const dismissed = JSON.parse(localStorage.getItem('sf_dismissed_cal')||'[]');
    if(!dismissed.includes(id)) dismissed.push(id);
    localStorage.setItem('sf_dismissed_cal', JSON.stringify(dismissed));
  }catch(e){}
  render();
}

function restoreDismissed(){
  localStorage.removeItem('sf_dismissed_cal');
  toast('All events restored','ok');
  render();
}

    if(window._aTemp.sections.includes(s)) window._aTemp.sections=window._aTemp.sections.filter(x=>x!==s);
    else window._aTemp.sections.push(s);
    b.classList.toggle('sel2');
  }));

  document.getElementById('am-call-btn').addEventListener('click',()=>{
    callContact(document.getElementById('am-cphone').value);
  });
  document.getElementById('am-text-btn').addEventListener('click',()=>{
    textContact(document.getElementById('am-cphone').value, document.getElementById('am-cname').value, document.getElementById('am-addr').value);
  });

  document.getElementById('am-save-btn').addEventListener('click',()=>{
    const t=window._aTemp;
    if(!t.address){toast('Address is required','err');return;}
    const all=getAssignments();
    const idx=all.findIndex(x=>x.id===t.id);
    if(idx>=0) all[idx]=t; else all.push(t);
    saveAssignments(all);
    closeAssignModal();
    render();
    toast('✅ Assignment saved!','ok');
  });

  const delBtn=document.getElementById('am-del-btn');
  if(delBtn) delBtn.addEventListener('click',()=>{
    deleteAssignment(window._aTemp.id);
    closeAssignModal();
    toast('Assignment removed','ok');
  });
}

function closeAssignModal(){
  document.getElementById('assign-modal').classList.add('hidden');
}

// ── CLICKUP UPDATE ────────────────────────────────────────────────────────
async function updateClickUpWithDriveLink(){
  if(!S.cuTaskId||!S.driveLink) return;
  try{
    await fetch(`https://api.clickup.com/api/v2/task/${S.cuTaskId}`,{
      method:'PUT',
      headers:{'Authorization':CU_TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({description:buildClickUpDescription()})
    });
    toast('📋 ClickUp task updated with Drive link!','ok');
  }catch(e){console.warn('ClickUp update failed:',e);}
}

// ── TOAST ──────────────────────────────────────────────────────────────────
function toast(msg,type=''){
  const ex=document.querySelector('.toast');if(ex)ex.remove();
  const t=document.createElement('div');t.className='toast'+(type?' '+type:'');t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3500);
}

// ── TODAY'S INSPECTIONS ───────────────────────────────────────────────────
function getTodayInspections(){
  try{
    const today=new Date().toISOString().slice(0,10);
    const all=JSON.parse(localStorage.getItem('sf_inspections')||'[]');
    return all.filter(i=>i.date===today);
  }catch(e){return[];}
}

function saveInspectionToHistory(){
  try{
    const today=new Date().toISOString().slice(0,10);
    const all=JSON.parse(localStorage.getItem('sf_inspections')||'[]');
    const entry={
      id:Date.now(),date:today,address:S.address,city:S.city,
      bank:(BANKS.find(b=>b.id===S.bank)||{}).name||S.bank,
      photos:totalPhotos(),units:S.units.length,
      cuTaskUrl:S.cuTaskUrl||'',status:totalPhotos()>0?'complete':'in-progress'
    };
    // Replace if same address+date exists
    const idx=all.findIndex(i=>i.date===today&&i.address===S.address);
    if(idx>=0) all[idx]=entry; else all.push(entry);
    localStorage.setItem('sf_inspections',JSON.stringify(all));
  }catch(e){}
}

function renderTodayInspections(){
  const items=getTodayInspections();
  if(!items.length) return '';
  const rows=items.map(i=>`
    <div class="today-item">
      <div>
        <div class="today-addr">${esc(i.address)}</div>
        <div class="today-meta">${esc(i.bank)} · ${i.photos} photos · ${i.units} units</div>
      </div>
      <span class="today-badge ${i.status==='complete'?'tb-done':'tb-inprog'}">${i.status==='complete'?'Done':'In Progress'}</span>
    </div>`).join('');
  return `<div class="today-card">
    <h3>📅 Today's Inspections <span style="color:var(--muted);font-weight:400">${items.length}</span></h3>
    ${rows}
  </div>`;
}

// ── TEXT ON MY WAY ─────────────────────────────────────────────────────────
function textOnMyWay(){
  const phone=S.onSitePhone||S.mgmtPhone||'';
  const name=S.onSiteName||S.mgmtContact||'the contact';
  const addr=S.address+', '+S.city;
  if(!phone){toast('No contact phone number entered yet','err');return;}
  const msg=encodeURIComponent(`Hi ${name}, this is your inspector from Spectrum Field Services. I am on my way for today's inspection at ${addr}. I will arrive shortly. Please ensure access is available. Thank you!`);

function showEmailMenu(){
  // Show a quick action sheet for email options

  sheet.id='email-sheet';

// ── CLICKUP INTEGRATION ────────────────────────────────────────────────────
async function createClickUpTask(){
  const btn=document.getElementById('clickup-btn');
  if(S.cuTaskUrl){window.open(S.cuTaskUrl,'_blank');return;}
  if(btn) btn.textContent='⏳ Creating task…';

  try{
    // Get reporter user ID first
    const usersRes=await fetch('https://api.clickup.com/api/v2/list/'+CU_LIST_ID+'/member',{
      headers:{'Authorization':CU_TOKEN,'Content-Type':'application/json'}
    });
    const usersData=await usersRes.json();
    const reporter=usersData.members?.find(m=>m.email===CU_REPORTER||m.username===CU_REPORTER);

    const dateStr=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const title=`${S.address} — ${(BANKS.find(b=>b.id===S.bank)||{}).name||''} — ${dateStr}`;
    const desc=buildClickUpDescription();

    const taskBody={
      name:title,
      description:desc,
      status:'to do',
      priority:2,
      due_date:new Date(Date.now()+86400000*2).getTime(), // 2 days from now
      assignees:reporter?[reporter.id]:[],
      custom_fields:[],
    };

    const res=await fetch('https://api.clickup.com/api/v2/list/'+CU_LIST_ID+'/task',{
      method:'POST',
      headers:{'Authorization':CU_TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify(taskBody)
    });
    const data=await res.json();

    if(data.id){
      S.cuTaskId=data.id;
      S.cuTaskUrl=data.url||`https://app.clickup.com/t/${data.id}`;
      saveInspectionToHistory();
      toast('✅ ClickUp task created!','ok');
      render();
    } else {
      throw new Error(data.err||JSON.stringify(data));
    }
  }catch(e){
    console.error(e);
    toast('ClickUp error: '+e.message,'err');
    if(btn) btn.textContent='📋 Create ClickUp Task';
  }
}

function buildClickUpDescription(){
  const addr=`${S.address}${S.city?', '+S.city:''}${S.state?', '+S.state:''}`;
  const bank=(BANKS.find(b=>b.id===S.bank)||{}).name||'';
  const v=x=>x||'—';
  const yn=x=>x==='yes'?'Yes':x==='no'?'No':'—';
  const r=x=>x?`${x}/5`:' —';

  // ── Property Info ──
  let desc = `## 🏢 Property Information
**Address:** ${v(addr)}
**Property Name:** ${v(S.propName)}
**Property Type:** ${v(S.propType)}
**Bank:** ${v(bank)}
**Inspection Date:** ${v(S.inspDate)} ${v(S.inspTime)}
**Rent Roll Provided:** ${yn(S.rentRoll)}

---
## 🏗️ Property Facts
| Field | Value |
|---|---|
| Buildings | ${v(S.numBuildings)} |
| Year Built | ${v(S.yearBuilt)} |
| Year Renovated | ${v(S.yearRenovated)} |
| Total Units | ${v(S.numUnits)} |
| Occupied Units | ${v(S.numOccupied)} |
| Vacant Units | ${v(S.numVacant)} |
| Down Units | ${v(S.numDown)} |
| Occupancy % | ${v(S.occupancyPct)}% |
| Square Feet | ${v(S.sqFt)} |
| Parking Spots | ${v(S.numParking)} |
| Roof Accessible | ${yn(S.roofAccess)} |
| Elevator | ${yn(S.elevator)} |
| Sprinkler | ${yn(S.sprinkler)} |
| Amenities | ${v(S.amenities)} |

**Neighborhood:** ${v(S.neighborhood)}
**Area Distressed:** ${yn(S.areaDistressed)} | **New Construction Nearby:** ${yn(S.newConstruction)}

---
## 👤 Contacts
**Accompanied By:** ${v(S.accompanied)} ${v(S.accompaniedPhone)}

**On-Site Contact:**
- Name: ${v(S.onSiteName)}
- Phone: ${v(S.onSitePhone)}
- Email: ${v(S.onSiteEmail)}

**Management Company:** ${v(S.mgmtCompany)}
- Interviewee: ${v(S.mgmtContact)} (${v(S.mgmtTitle)})
- Phone: ${v(S.mgmtPhone)}
- Email: ${v(S.mgmtEmail)}
- Length at Property: ${v(S.mgmtLength)}
- Management Change Since Last Inspection: ${yn(S.mgmtChange)}

**Utilities — Who Pays:**
| Utility | Paid By |
|---|---|
| Heat | ${v(S.heatPaidBy)} |
| Water | ${v(S.waterPaidBy)} |
| Electric | ${v(S.electricPaidBy)} |
| Gas | ${v(S.gasPaidBy)} |
| Trash | ${v(S.trashPaidBy)} |
| Cable | ${v(S.cablePaidBy)} |

**Fire/Water Damage (Past 12 mo):** ${yn(S.fireDamage)}${S.fireDamageDetails?' — '+S.fireDamageDetails:''}
**Code Violations (Past 12 mo):** ${yn(S.codeViolations)}${S.codeDetails?' — '+S.codeDetails:''}

---
## ⭐ Overall Condition Rating: ${r(S.overallRating)}
${v(S.overallComment)}

## 🔍 Physical Condition Assessment
| Area | Rating | Trend | Notes |
|---|---|---|---|
| Site | ${r(S.condSite)} | ${v(S.condSiteTrend)} | ${v(S.condSiteNote)} |
| Building/Mechanical | ${r(S.condMech)} | ${v(S.condMechTrend)} | ${v(S.condMechNote)} |
| Building Exteriors | ${r(S.condExt)} | ${v(S.condExtTrend)} | ${v(S.condExtNote)} |
| Roof | ${r(S.condRoof)} | ${v(S.condRoofTrend)} | ${v(S.condRoofNote)} |
| Occupied Units | ${r(S.condOccUnit)} | ${v(S.condOccUnitTrend)} | ${v(S.condOccUnitNote)} |
| Vacant Units | ${r(S.condVacUnit)} | ${v(S.condVacUnitTrend)} | ${v(S.condVacUnitNote)} |
| Common Areas | ${r(S.condCommon)} | ${v(S.condCommonTrend)} | ${v(S.condCommonNote)} |
| Amenities | ${r(S.condAmen)} | ${v(S.condAmenTrend)} | ${v(S.condAmenNote)} |
| Environmental | ${r(S.condEnv)} | ${v(S.condEnvTrend)} | ${v(S.condEnvNote)} |
`;

  // ── Santander extras ──
  if(S.bank==='santander'){
    desc += `
---
## 🚨 Santander — Limitations
| Limitation | Response |
|---|---|
| Management unavailable | ${yn(S.limMgmtUnavail)} |
| Mgmt experience <6 months | ${yn(S.limMgmtExp)} |
| Units unavailable | ${yn(S.limUnitsUnavail)} |
| Common areas unavailable | ${yn(S.limCommonUnavail)} |
| Snow covering exterior | ${yn(S.limSnow)} |
| Other | ${yn(S.limOther)} |
${S.limComment?'**Comment:** '+S.limComment:''}

## 🚨 Critical Items
| Item | Response |
|---|---|
| Violent crime on property | ${yn(S.critCrime)} |
| Significant insurance loss | ${yn(S.critInsurance)} |
| Life/safety issue noted | ${yn(S.critLifeSafety)} |
| Down units not previously noted | ${yn(S.critDownUnits)} |
| Outstanding code violations | ${yn(S.critCodeViol)} |
${S.critComment?'**Comment:** '+S.critComment:''}
`;
  }

  // ── Units Inspected ──
  if(S.units.length){
    const statusIcon=st=>st==='occupied'?'🟢':st==='vacant'?'🔵':'🔴';
    const unitRows=S.units.map(u=>`| ${u.label||'—'} | ${statusIcon(u.status)} ${u.status||'—'} | ${v(u.type)} | ${v(u.baths)} | ${v(u.condition)}/5 | ${(u.checks||[]).join(', ')||'—'} | ${v(u.notes)} |`).join('\n');

## 🏠 Units Inspected (${S.units.length})

${unitRows}

  // ── Photo Checklist ──
  desc += `
---
## 📸 Photo Checklist
**Total Photos:** ${totalPhotos()} | **Minimum Required:** ${CL[S.bank]?.photoMin||'—'}
`;
  S.sections.forEach(sid=>{
    const lbl=(SECTION_TYPES.find(s=>s.id===sid)||{}).label||sid;
    const items=CL[S.bank]?.sections[sid]||[];
    desc += `\n**${lbl}**\n`;
    items.forEach(item=>{
      const d=S.photoData[item.id]||{};
      const cnt=(d.photos||[]).length;
      desc += `${cnt>0?'✅':'❌'} ${item.label}${item.req?' _(required)_':''} — ${cnt} photo(s)${d.note?' — '+d.note:''}\n`;
    });
  });

  // ── Missing photos ──
  const missing=missingReq();
  if(missing.length){
    desc += `\n---\n## ⚠️ Missing Required Photos\n`;
    missing.forEach(m=>desc+=`- ${m}\n`);
  }

  // ── Drive link ──
  if(S.driveLink){
    desc += `\n---\n## 📁 Google Drive Photos\n${S.driveLink}\n`;
  }

  return desc;
}
