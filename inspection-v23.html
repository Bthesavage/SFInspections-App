<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SF Inspect">
<meta name="theme-color" content="#2563eb">
<title>SF Field Inspection</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD-placeholder&libraries=places&callback=initMaps" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* ── Light mode (mockup) ── */
  --bg:#f0f4f8;--surface:#ffffff;--surface2:#f8fafc;--surface3:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --accent:#2563eb;--accent-light:#eff6ff;--accent-dark:#1d4ed8;
  --accent2:#7c3aed;--accent3:#f59e0b;
  --green:#059669;--green-light:#ecfdf5;
  --amber:#d97706;--amber-light:#fffbeb;
  --red:#dc2626;--red-light:#fef2f2;
  --blue-light:#eff6ff;
  --text:#0f172a;--text2:#334155;--muted:#64748b;--muted2:#94a3b8;
  --font:'Inter',system-ui,sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--r2:14px;--r3:18px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
  --nav-h:64px;
}
html,body{height:100%;background:var(--bg);overflow:hidden}
body{font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased}
#app{height:100%;display:flex;flex-direction:column;max-width:500px;margin:0 auto;position:relative;background:var(--bg)}

/* ── TOP HEADER ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:max(env(safe-area-inset-top),12px) 16px 10px;flex-shrink:0;position:relative;z-index:50}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-icon{width:34px;height:34px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hdr h1{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.01em}
.hdr .sub{font-size:11px;color:var(--muted);margin-top:1px}
.hdr-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all .15s}
.hdr-btn:hover{background:var(--border);color:var(--text)}
.prog-bar{height:3px;background:var(--border);margin-top:8px;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}

/* ── SCREEN NAV (pill tabs) ── */
.screen-nav{display:flex;gap:4px;overflow-x:auto;padding:8px 16px;scrollbar-width:none;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border)}
.screen-nav::-webkit-scrollbar{display:none}
.snav-btn{background:transparent;border:none;color:var(--muted);padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;font-family:var(--font);flex-shrink:0;display:flex;align-items:center;gap:4px;transition:all .15s}
.snav-btn.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.snav-btn.done{color:var(--green)}
.snav-btn .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pad{padding:16px}

/* ── SECTION CARDS ── */
.section-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.section-card h3{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:6px}

/* ── FORM ELEMENTS ── */
.field-row{margin-bottom:12px}
.field-row:last-child{margin-bottom:0}
.field-lbl{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:5px;letter-spacing:.02em}
.field-inp{width:100%;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--r);font-size:15px;font-family:var(--font);outline:none;-webkit-appearance:none;transition:border-color .15s}
.field-inp:focus{border-color:var(--accent);background:var(--surface)}
.field-inp::placeholder{color:var(--muted)}
.field-sel{width:100%;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--r);font-size:14px;font-family:var(--font);outline:none;-webkit-appearance:none;cursor:pointer;transition:border-color .15s}
.field-ta{width:100%;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--r);font-size:14px;font-family:var(--font);resize:none;outline:none;line-height:1.5;-webkit-appearance:none;transition:border-color .15s}
.field-ta:focus,.field-sel:focus,.field-inp:focus{border-color:var(--accent);background:var(--surface)}
.field-ta::placeholder{color:var(--muted)}

/* ── CHIP SELECTORS ── */
.chip-grid{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--border2);background:var(--surface3)}
.chip.sel{background:var(--accent-light);border-color:var(--accent);color:var(--accent);font-weight:600}
.chip.sel2{background:#f5f3ff;border-color:var(--accent2);color:var(--accent2);font-weight:600}
.chip.sel3{background:var(--green-light);border-color:var(--green);color:var(--green);font-weight:600}
.chip-2col{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.yn-row{display:flex;gap:8px}
.yn-btn{flex:1;background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);padding:10px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);text-align:center;transition:all .15s}
.yn-btn:hover{border-color:var(--border2)}
.yn-btn.yes{background:var(--green-light);border-color:var(--green);color:var(--green)}
.yn-btn.no{background:var(--red-light);border-color:var(--red);color:var(--red)}

/* ── ACTION BUTTONS ── */
.btn-primary{width:100%;background:var(--accent);color:#fff;border:none;padding:14px;border-radius:var(--r2);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);letter-spacing:-.01em;transition:all .15s;box-shadow:0 1px 2px rgba(37,99,235,.3)}
.btn-primary:hover{background:var(--accent-dark)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{width:100%;background:var(--surface);border:1.5px solid var(--border);color:var(--text2);padding:12px;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.btn-secondary:hover{background:var(--surface2);border-color:var(--border2)}
.btn-green{background:var(--green);border-color:var(--green);color:white}
.btn-green:hover{background:#047857;border-color:#047857}
.btn-blue{background:var(--accent);border-color:var(--accent);color:white;font-weight:600}
.btn-blue:hover{background:var(--accent-dark)}

/* ── HERO ── */
.hero{text-align:center;padding:24px 0 20px}
.hero .logo{width:64px;height:64px;background:var(--accent);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;box-shadow:var(--shadow-md)}
.hero h2{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.hero p{color:var(--muted);font-size:13px;margin-top:6px}

/* ── GENERAL NOTES ── */
.notes-quickadd{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.notes-qa-btn{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap}
.notes-qa-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.notes-ts-toggle{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.notes-ts-toggle label{font-size:11px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px}
.notes-ts-toggle input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px}
.general-notes-ta{width:100%;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:12px;border-radius:var(--r);font-size:14px;font-family:var(--font);resize:none;outline:none;line-height:1.6;-webkit-appearance:none;min-height:120px;transition:all .2s}
.general-notes-ta:focus{border-color:var(--accent);background:var(--surface);min-height:160px}
.general-notes-ta::placeholder{color:var(--muted)}

/* ── DRAFT SYSTEM ── */
.draft-bar{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.draft-bar::-webkit-scrollbar{display:none}
.draft-pill{background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font);white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0;transition:all .15s}
.draft-pill.active-draft{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.draft-pill.new-draft{border-color:var(--green);color:var(--green);background:var(--green-light)}
.draft-pill .dpill-x{opacity:.5;font-size:10px;margin-left:2px}
.autosave-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;opacity:0;transition:opacity .3s}
.autosave-dot.show{opacity:1}
.draft-modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.draft-modal-bg.hidden{display:none}
.draft-modal{background:var(--surface);border:1.5px solid var(--border);border-radius:20px 20px 0 0;padding:24px 20px max(env(safe-area-inset-bottom),24px);width:100%;max-width:500px;max-height:70vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.12)}
.draft-modal h3{font-size:15px;font-weight:600;color:var(--accent2);margin-bottom:16px;letter-spacing:-.01em}
.draft-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.draft-row:hover{border-color:var(--accent)}
.draft-row.current{border-color:var(--accent);background:var(--accent-light)}
.draft-row-info{flex:1;min-width:0}
.draft-row-addr{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.draft-row-meta{font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.draft-row-actions{display:flex;gap:6px;flex-shrink:0}
.draft-act-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s}
.draft-act-btn.load{color:var(--accent);border-color:var(--accent)}
.draft-act-btn.del{color:var(--red);border-color:rgba(220,38,38,.3)}

/* ── PHOTO ITEMS ── */
.photo-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.photo-item.done{border-color:var(--green)}
.photo-item.req{border-left:3px solid var(--amber);border-radius:0 var(--r2) var(--r2) 0}
.photo-item.req.done{border-left:3px solid var(--green);border-radius:0 var(--r2) var(--r2) 0}
.photo-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.photo-chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all .2s;background:var(--surface2)}
.photo-chk.done{background:var(--green);border-color:var(--green);color:#fff}
.photo-info{flex:1}
.photo-lbl{font-size:13px;font-weight:500;color:var(--text)}
.req-tag{background:var(--amber-light);color:var(--amber);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:6px;text-transform:uppercase;letter-spacing:.05em}
.photo-hint{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.caption-preview{font-size:11px;color:var(--accent);margin-top:4px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:210px}
.photo-cnt{font-size:11px;color:var(--muted);font-family:var(--mono);flex-shrink:0}
.photo-body{padding:0 14px 14px;border-top:1px solid var(--border)}
.thumbs{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 8px}
.thumb{position:relative;width:68px;height:68px;border-radius:8px;overflow:visible;background:var(--surface2);border:1.5px solid var(--border);flex-shrink:0;margin-bottom:26px}
.thumb img{width:68px;height:68px;object-fit:cover;border-radius:7px;display:block}
.thumb-x{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:12px;line-height:18px;text-align:center;cursor:pointer;padding:0;z-index:2}
.thumb-cap{position:absolute;top:68px;left:-1px;right:-1px;width:calc(100% + 2px);background:rgba(15,23,42,.8);border-top:none;border-radius:0 0 6px 6px;color:#fff;font-size:9px;padding:3px 4px;box-sizing:border-box;font-family:var(--font);outline:none;text-align:center;border:none}
.thumb-cap::placeholder{color:rgba(255,255,255,.4)}
.cam-row{display:flex;gap:8px;margin-top:8px}
.cam-btn{flex:1;background:var(--surface2);border:1.5px dashed var(--border2);color:var(--muted);padding:11px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.cam-btn.pri{background:var(--accent-light);border-color:var(--accent);color:var(--accent);border-style:solid}
.cam-btn:hover{border-color:var(--accent);color:var(--accent)}
.note-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-top:10px;margin-bottom:4px}

/* ── COMPASS ── */
.compass-wrap{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.compass-title{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:600;margin-bottom:10px}
.compass-dial{width:100px;height:100px;margin:0 auto 10px;position:relative}
.compass-ring{width:100%;height:100%;border-radius:50%;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;position:relative}
.compass-needle{position:absolute;width:4px;height:40px;top:50%;left:50%;transform-origin:bottom center;transform:translateX(-50%) translateY(-100%)}
.needle-n{width:100%;height:50%;background:var(--red);border-radius:2px 2px 0 0}
.needle-s{width:100%;height:50%;background:var(--muted2);border-radius:0 0 2px 2px}
.compass-n{position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:var(--red);font-family:var(--mono)}
.compass-dirs{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dir-btn{background:var(--surface);border:2px solid var(--border);color:var(--muted);padding:10px;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);text-align:center;transition:all .15s}
.dir-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.compass-result{text-align:center;font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
.compass-result strong{color:var(--accent)}

/* ── UNIT CARDS ── */
.unit-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.unit-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.unit-badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600;font-family:var(--mono)}
.badge-occ{background:var(--green-light);color:var(--green)}
.badge-vac{background:var(--accent-light);color:var(--accent)}
.badge-down{background:var(--red-light);color:var(--red)}
.unit-body{padding:0 14px 14px;border-top:1px solid var(--border)}
.unit-num{font-size:15px;font-weight:600;color:var(--text)}
.unit-cond{font-size:11px;color:var(--muted);margin-top:2px}
.add-unit-btn{width:100%;background:var(--surface);border:2px dashed var(--border2);color:var(--accent);padding:14px;border-radius:var(--r2);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;transition:all .15s}
.add-unit-btn:hover{background:var(--accent-light);border-color:var(--accent)}

/* ── RATING BUTTONS ── */
.rating-row{display:flex;gap:6px;margin-top:6px}
.rating-btn{flex:1;background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);padding:8px 4px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--mono);text-align:center;transition:all .15s}
.rating-btn.sel-r{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}

/* ── SECTION TABS ── */
.sec-tabs{display:flex;gap:5px;overflow-x:auto;padding:0 0 2px;scrollbar-width:none;margin-bottom:14px}
.sec-tabs::-webkit-scrollbar{display:none}
.sec-tab{background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;font-family:var(--font);flex-shrink:0;transition:all .15s}
.sec-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.sec-tab.done{border-color:var(--green);color:var(--green);background:var(--green-light)}
.sec-tab .cnt{background:rgba(255,255,255,.25);border-radius:8px;padding:1px 5px;margin-left:3px;font-size:9px}
.sec-tab.done .cnt{background:rgba(5,150,105,.15)}

/* ── BANK BANNER ── */
.bank-note{background:var(--accent-light);border:1px solid rgba(37,99,235,.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:var(--accent-dark);line-height:1.6}
.bank-note strong{color:var(--accent)}

/* ── SUMMARY ── */
.sum-hero{text-align:center;padding:20px 0 16px}
.sum-hero .icon{font-size:52px;margin-bottom:8px}
.sum-hero h2{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.sum-hero p{color:var(--muted);font-size:13px;margin-top:4px}
.stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.stat-card h3{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;font-weight:600}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-lbl{font-size:13px;color:var(--text2)}
.stat-val{font-size:13px;font-family:var(--mono);color:var(--accent);font-weight:500}
.stat-val.ok{color:var(--green)}
.stat-val.warn{color:var(--amber)}
.miss-item{font-size:12px;color:var(--amber);padding:5px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.miss-item:last-child{border-bottom:none}

/* ── FOLDER PREVIEW ── */
.folder-tree{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.folder-tree h3{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;font-weight:600}
.ftree-root{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ftree-child{font-size:12px;color:var(--muted);padding:5px 0 5px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ftree-child:last-child{border-bottom:none}
.ftree-badge{background:var(--accent-light);border-radius:6px;font-size:10px;padding:2px 7px;font-family:var(--mono);color:var(--accent);font-weight:500}

/* ── DRIVE STATUS ── */
.drive-bar{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;font-size:12px;box-shadow:var(--shadow)}
.drive-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.drive-dot.on{background:var(--green)}
.drive-dot.off{background:var(--muted2)}
.drive-dot.spin{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── UPLOAD STEPS ── */
.up-steps{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.up-steps h3{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;font-weight:600}
.up-step{font-size:12px;padding:4px 0;display:flex;align-items:center;gap:8px;color:var(--muted)}
.up-step.done{color:var(--green)}
.up-step.active{color:var(--amber)}

/* ── TOAST ── */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;max-width:88vw;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.2)}

.toast.err{background:var(--red)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 18px max(env(safe-area-inset-bottom),20px);width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.12)}
.modal h3{font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px;letter-spacing:-.02em}
.modal-close{float:right;background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:var(--border);color:var(--text)}

/* ── PHOTO ASSIGN MODAL ── */
.photo-assign-modal .draft-modal{padding-bottom:32px}

/* ── DASHBOARD ── */
.dash-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.dash-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.dash-date{font-size:12px;color:var(--muted);margin-top:2px}
/* Stat summary row */
.dash-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.dash-stat{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);padding:14px;box-shadow:var(--shadow)}
.dash-stat-num{font-size:28px;font-weight:700;letter-spacing:-.03em;line-height:1}
.dash-stat-lbl{font-size:11px;font-weight:500;color:var(--muted);margin-top:4px}
.dash-stat-sub{font-size:10px;color:var(--muted);margin-top:2px}
.ds-today .dash-stat-num{color:var(--accent)}
.ds-saved .dash-stat-num{color:var(--amber)}
.ds-uploading .dash-stat-num{color:var(--accent2)}
.ds-done .dash-stat-num{color:var(--green)}
/* Assignment cards */
.assign-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);transition:border-color .15s}
.assign-card:hover{border-color:var(--border2)}
.assign-card.done{border-color:var(--green);opacity:.75}
.assign-top{padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.assign-status{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:all .2s;background:var(--surface2)}
.assign-status.done{background:var(--green);border-color:var(--green);color:#fff}
.assign-status.inprog{background:var(--accent);border-color:var(--accent);color:#fff}
.assign-info{flex:1;min-width:0}
.assign-addr{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.assign-bank{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500}
.assign-contact{font-size:11px;color:var(--text2);margin-top:4px}
.assign-actions{display:flex;gap:6px;padding:0 14px 12px}
.act-btn{flex:1;padding:8px 6px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s}
.act-btn:hover{border-color:var(--border2);background:var(--surface3)}
.act-btn.call{border-color:var(--green);color:var(--green);background:var(--green-light)}
.act-btn.text{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.act-btn.start{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.act-btn.start:hover{background:var(--accent-dark)}
.act-btn.edit{border-color:var(--border);color:var(--muted)}
/* Swipe cards */
.swipe-wrap{position:relative;overflow:hidden;border-radius:var(--r2);margin-bottom:10px}
.swipe-card{position:relative;transition:transform .25s ease;touch-action:pan-y;cursor:grab}
.swipe-card.swiping{transition:none}
.swipe-bg{position:absolute;inset:0;background:var(--red);border-radius:var(--r2);display:flex;align-items:center;justify-content:flex-end;padding-right:20px;color:white;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s}
.swipe-bg.visible{opacity:1}
.swipe-hint{font-size:10px;color:var(--muted);text-align:center;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:4px}
/* Calendar */
.cal-pill{background:var(--accent-light);border:1px solid rgba(37,99,235,.2);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:500;color:var(--accent);display:inline-flex;align-items:center;gap:5px;cursor:pointer;margin-bottom:12px;transition:all .15s}
.cal-pill.linked{background:var(--green-light);border-color:rgba(5,150,105,.25);color:var(--green)}
.cal-list{max-height:300px;overflow-y:auto}
.cal-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.cal-item:last-child{border-bottom:none}
.cal-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.cal-item-name{font-size:13px;font-weight:500;color:var(--text)}
.cal-item-acc{font-size:11px;color:var(--muted)}
.cal-check{margin-left:auto;color:var(--green);font-size:16px}
.add-assign-btn{width:100%;background:var(--surface);border:2px dashed var(--border2);color:var(--accent);padding:14px;border-radius:var(--r2);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;transition:all .15s}
.add-assign-btn:hover{background:var(--accent-light);border-color:var(--accent)}
.empty-dash{text-align:center;padding:32px 20px;color:var(--muted)}
.empty-dash .empty-icon{font-size:48px;margin-bottom:12px}
.empty-dash p{font-size:13px;line-height:1.6}
/* Recent inspections */
.today-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
.today-card h3{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.today-item{padding:8px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:8px}
.today-item:last-child{border-bottom:none}
.today-addr{font-size:13px;font-weight:500;color:var(--text)}
.today-meta{font-size:11px;color:var(--muted);margin-top:2px}
.today-badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:500}
.tb-done{background:var(--green-light);color:var(--green)}
.tb-inprog{background:var(--amber-light);color:var(--amber)}
/* Section labels */
.section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:16px 0 8px;padding:0 2px}

.pb{padding-bottom:max(env(safe-area-inset-bottom),20px)}
.divider{height:1px;background:var(--border);margin:14px 0}
.small-note{font-size:11px;color:var(--muted);line-height:1.5;margin-top:6px}
.hidden{display:none}

/* ── AI BULK REVIEW ── */
.ai-review-modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:300;display:flex;flex-direction:column;backdrop-filter:blur(3px)}
.ai-review-modal-bg.hidden{display:none}
.ai-review-panel{background:var(--surface);flex:1;display:flex;flex-direction:column;overflow:hidden;max-width:500px;width:100%;margin:0 auto;border-top:1px solid var(--border)}
.ai-review-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface)}
.ai-review-title{font-size:15px;font-weight:600;color:var(--text)}
.ai-review-prog{font-size:11px;color:var(--muted);font-family:var(--mono)}
.ai-review-body{flex:1;overflow-y:auto;padding:0}
.ai-card{border-bottom:1px solid var(--border)}
.ai-card-img{width:100%;height:200px;object-fit:cover;display:block;background:var(--surface2)}
.ai-card-content{padding:14px 16px}
.ai-card-status{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ai-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;letter-spacing:.03em}
.ai-badge-thinking{background:var(--amber-light);color:var(--amber)}
.ai-badge-ready{background:var(--accent-light);color:var(--accent)}
.ai-badge-accepted{background:var(--green-light);color:var(--green)}
.ai-badge-skipped{background:var(--surface2);color:var(--muted)}
.ai-confidence{font-size:10px;color:var(--muted);font-family:var(--mono)}
.ai-suggestion-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px}
.ai-suggestion-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
.ai-suggestion-value{font-size:14px;font-weight:500;color:var(--text)}
.ai-suggestion-value.editing{color:var(--accent)}
.ai-edit-input{width:100%;background:var(--surface);border:1.5px solid var(--accent);color:var(--text);padding:8px 10px;border-radius:8px;font-size:14px;font-family:var(--font);outline:none;margin-top:4px}
.ai-actions{display:flex;gap:8px}
.ai-btn-accept{flex:1;background:var(--accent);color:#fff;border:none;padding:11px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.ai-btn-accept:hover{background:var(--accent-dark)}
.ai-btn-accept.accepted{background:var(--green)}
.ai-btn-edit{flex:none;padding:11px 14px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s}
.ai-btn-edit:hover{border-color:var(--border2)}
.ai-btn-skip{flex:none;padding:11px 14px;background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)}
.ai-footer{padding:14px 16px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.ai-footer-stats{font-size:12px;color:var(--muted);margin-bottom:10px;text-align:center}
.ai-btn-apply-all{width:100%;background:var(--accent);color:#fff;border:none;padding:13px;border-radius:var(--r2);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font)}
.ai-btn-apply-all:disabled{opacity:.4}
.ai-processing-card{padding:20px 16px;text-align:center;border-bottom:1px solid var(--border)}
.ai-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-bulk-btn{background:var(--accent-light);border:1.5px solid rgba(37,99,235,.25);color:var(--accent);padding:10px 14px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.ai-bulk-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── CAPTION LIBRARY ── */
.cap-lib-modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;backdrop-filter:blur(2px)}
.cap-lib-modal-bg.hidden{display:none}
.cap-lib-panel{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.12)}
.cap-lib-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.cap-lib-header h4{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px}
.cap-lib-search-wrap{position:relative}
.cap-lib-search{width:100%;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:9px 12px 9px 36px;border-radius:10px;font-size:14px;font-family:var(--font);outline:none}
.cap-lib-search:focus{border-color:var(--accent)}
.cap-lib-search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.cap-lib-body{flex:1;overflow-y:auto;padding:4px 0 16px}
.cap-lib-section{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:10px 16px 4px}
.cap-lib-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:background .1s;border-bottom:0.5px solid var(--border)}
.cap-lib-item:hover{background:var(--surface2)}
.cap-lib-text{flex:1;font-size:13px;color:var(--text);line-height:1.4}
.cap-lib-fav{background:none;border:none;color:var(--muted2);font-size:16px;cursor:pointer;padding:4px;flex-shrink:0;transition:color .15s}

.cap-lib-fav:hover{color:#f59e0b}
.cap-lib-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0;line-height:1}
</style>
</head>
<body>
<div id="app">
  <div class="hdr" id="hdr">
    <div class="hdr-top">
      <div class="hdr-left">
        <div class="hdr-icon" style="font-size:13px;font-weight:700;color:#fff;letter-spacing:-.02em">SF</div>
        <div>
          <h1 id="hdr-title">SF Field Inspection</h1>
          <div class="sub" id="hdr-sub">Configure your inspection</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <div class="autosave-dot" id="autosave-dot" title="Auto-saved"></div>
        <button class="hdr-btn" id="drafts-btn" onclick="openDraftManager()" style="color:var(--accent2);border-color:var(--accent2)">📋 Drafts</button>

</div>

      <h3 style="margin-bottom:0">📋 Inspection Drafts</h3>
      <button onclick="closeDraftManager()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px">✕</button>

<!-- Assignment modal -->

</div>

<!-- Unit modal -->

</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const GCL_ID = '608140101331-krho9nv7021d0c262b0j199omb8m1jss.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.readonly';
const FOLDER_MAP = {exterior:'1. Exterior',commercial:'1. Exterior',other:'1. Exterior',amenities_ext:'1. Exterior',parking_garage:'1. Exterior',interior:'2. Interior',occupied:'2. Interior',vacant:'2. Interior',amenities_int:'2. Interior',deferred:'3. Deferred Maintenance'};

// All unit photo slot IDs — used for filename logic and caption prompts
const OCC_UNIT_IDS = ['occ_living','occ_kitchen','occ_bathroom','occ_bedroom'];
const VAC_UNIT_IDS = ['vac_living','vac_kitchen','vac_bathroom','vac_bedroom'];
const UNIT_PHOTO_IDS = [...OCC_UNIT_IDS, ...VAC_UNIT_IDS];

// Room label used in filenames when no caption entered
const UNIT_ROOM_LABEL = {
  occ_living:   'OCCUPIED-UNIT-LIVING-ROOM',
  occ_kitchen:  'OCCUPIED-UNIT-KITCHEN',
  occ_bathroom: 'OCCUPIED-UNIT-BATHROOM',
  occ_bedroom:  'OCCUPIED-UNIT-BEDROOM',
  vac_living:   'VACANT-UNIT-LIVING-ROOM',
  vac_kitchen:  'VACANT-UNIT-KITCHEN',
  vac_bathroom: 'VACANT-UNIT-BATHROOM',
  vac_bedroom:  'VACANT-UNIT-BEDROOM',
};

// Defines the canonical upload order for each bank.
// Photos uploaded to Drive will be named 001_, 002_, etc. in this sequence.
// Items NOT in the sequence map get appended at the end in section order.

// Universal photo upload sequence — same order for all banks.
// Order defined by Savage Field Inspections vendor requirements:
// Broad → Signage → Address → N/S/E/W → Roof → Ingress → Parking →
// Ext Common → Ext Amenities → Surrounding → Street → Int Amenities →
// Int Common → Occupied Units → Vacant Units → Ext DM → Ext LS → Int DM → Int LS

  'broad',
  'signage',
  'addr_verify',
  'north',
  'south',
  'east',
  'west',
  'roof',
  'ingress',
  'parking',
  'parking_garage',
  'common_ext',
  'grounds',
  'amenities_ext',
  'ada_ext',
  'surrounding',
  'street',
  'amenities_int',
  'common_int',
  'lobby',

const VENDOR_SEQUENCE = {
  ncb:       UNIVERSAL_PHOTO_ORDER,
  mt:        UNIVERSAL_PHOTO_ORDER,
  santander: UNIVERSAL_PHOTO_ORDER,
  wells:     UNIVERSAL_PHOTO_ORDER,
  habib:     UNIVERSAL_PHOTO_ORDER,
  esquire:   UNIVERSAL_PHOTO_ORDER,
  other:     UNIVERSAL_PHOTO_ORDER,
};

// Returns the global sequence number (1-based) for a given itemId under current bank
function getPhotoSequenceNum(itemId) {
  const seq = VENDOR_SEQUENCE[S.bank] || [];
  const idx = seq.indexOf(itemId);
  if(idx >= 0) return idx + 1;
  // Fallback: append after all sequenced items
  return seq.length + 1;
}

// Build a zero-padded filename with sequence number
// e.g. "001_DM-CRACKED-SIDEWALK-FRONT.jpg"
function buildSequencedPhotoName(itemId, itemLabel, caption, ext, photoIndex) {
  const seqBase = getPhotoSequenceNum(itemId);
  const seqStr = String(seqBase).padStart(3, '0');
  const suffix = photoIndex > 0 ? String.fromCharCode(97 + photoIndex) : ''; // a, b, c...

  let nameSource;

  if(UNIT_PHOTO_IDS && UNIT_PHOTO_IDS.includes(itemId)){
    // Unit photos: caption is the primary source (should include unit # and room)
    // e.g. "Occupied Unit 3 – Living Room" → "027_OCCUPIED-UNIT-3-LIVING-ROOM.jpg"
    // If no caption entered, use the readable room label as fallback
    nameSource = (caption && caption.trim())
      ? caption.trim()
      : (UNIT_ROOM_LABEL[itemId] || itemLabel || 'UNIT-PHOTO');
  } else {
    // All other photos: caption if present, otherwise item label
    nameSource = (caption && caption.trim())
      ? caption.trim()
      : (itemLabel || 'photo');
  }

  const safeName = nameSource
    .toUpperCase()
    .replace(/[^A-Z0-9\s\-]/g, '')   // keep letters, nums, spaces, hyphens
    .replace(/\s+/g, '-')             // spaces → hyphens
    .replace(/-{2,}/g, '-')           // collapse double hyphens
    .slice(0, 55);

  return `${seqStr}${suffix}_${safeName}.${ext}`;
}

// Get ALL photos from current inspection in vendor sequence order
// Returns array of {itemId, itemLabel, photoIndex, photoEntry, seqNum, filename}
function getAllPhotosSequenced() {
  const c = cl();
  if(!c) return [];

  const seq = VENDOR_SEQUENCE[S.bank] || [];
  const result = [];

  // First pass: items in vendor sequence order
  const processedIds = new Set();

  for(const itemId of seq) {
    const photos = S.photoData[itemId]?.photos || [];
    if(!photos.length) continue;

    // Find label
    let itemLabel = itemId;
    for(const items of Object.values(c.sections || {})) {
      const found = (items||[]).find(i => i.id === itemId);
      if(found) { itemLabel = found.label; break; }
    }

    photos.forEach((p, pi) => {
      const ext = (p.url || '').includes('png') ? 'png' : 'jpg';
      result.push({
        itemId, itemLabel, photoIndex: pi, photoEntry: p,
        seqNum: getPhotoSequenceNum(itemId),
        filename: buildSequencedPhotoName(itemId, itemLabel, p.caption || '', ext, pi),
        subfolder: _getSubfolderForItem(itemId),
      });
    });
    processedIds.add(itemId);
  }

  // Second pass: any items NOT in the sequence map (custom slots etc.)
  let tailSeq = seq.length + 1;
  for(const [itemId, data] of Object.entries(S.photoData || {})) {
    if(processedIds.has(itemId)) continue;
    const photos = data.photos || [];
    if(!photos.length) continue;

    let itemLabel = itemId;
    for(const items of Object.values(c.sections || {})) {
      const found = (items||[]).find(i => i.id === itemId);
      if(found) { itemLabel = found.label; break; }
    }

    photos.forEach((p, pi) => {
      const ext = (p.url || '').includes('png') ? 'png' : 'jpg';
      result.push({
        itemId, itemLabel, photoIndex: pi, photoEntry: p,
        seqNum: tailSeq,
        filename: buildSequencedPhotoName(itemId, itemLabel, p.caption || '', ext, pi),
        subfolder: _getSubfolderForItem(itemId),
      });
    });
    processedIds.add(itemId);
    tailSeq++;
  }

  return result;
}




// ── DRAFT / AUTOSAVE SYSTEM ────────────────────────────────────────────────
const DRAFT_KEY = 'sf_drafts_v1';
const ACTIVE_DRAFT_KEY = 'sf_active_draft_id';
let activeDraftId = localStorage.getItem(ACTIVE_DRAFT_KEY) || null;
let _autoSaveTimer = null;

function getDrafts(){
  try{ return JSON.parse(localStorage.getItem(DRAFT_KEY)||'[]'); }catch(e){ return []; }
}
function saveDrafts(arr){
  try{ localStorage.setItem(DRAFT_KEY, JSON.stringify(arr)); }catch(e){ toast('⚠️ Storage full — clear old drafts','err'); }
}

// Auto-save current S state into the active draft slot (debounced 1.5s)
function triggerAutoSave(){
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(()=>{
    // Don't autosave a blank setup screen
    if(!S.bank && !S.address && S.screen==='setup') return;
    _flushAutoSave();
  }, 1500);
}

function _flushAutoSave(){
  try{
    const drafts = getDrafts();
    const now = Date.now();
    const snapshot = buildSnapshot();
    if(activeDraftId){
      const idx = drafts.findIndex(d=>d.id===activeDraftId);
      if(idx>=0){
        drafts[idx].snapshot = snapshot;
        drafts[idx].savedAt = now;
        drafts[idx].address = S.address||'Untitled';
        drafts[idx].bank = S.bank;
        drafts[idx].screen = S.screen;
        saveDrafts(drafts);
        flashAutosaveDot();
        return;
      }
    }
    // No active draft — create one
    const id = 'draft_'+now;
    activeDraftId = id;
    localStorage.setItem(ACTIVE_DRAFT_KEY, id);
    drafts.unshift({ id, address: S.address||'Untitled', bank: S.bank, screen: S.screen, savedAt: now, snapshot });
    saveDrafts(drafts.slice(0,30));
    flashAutosaveDot();
  }catch(e){ console.warn('autosave failed',e); }
}

function buildSnapshot(){
  // Serialize S but skip blob URLs in photoData (can't store those)
  const copy = JSON.parse(JSON.stringify(S));
  // Strip blob photo data but keep notes
  if(copy.photoData){
    Object.keys(copy.photoData).forEach(k=>{
      if(copy.photoData[k].photos){
        copy.photoData[k].photos = copy.photoData[k].photos.filter(p=>!p.url?.startsWith('blob:'));
      }
    });
  }
  return JSON.stringify(copy);
}

function flashAutosaveDot(){
  const dot = document.getElementById('autosave-dot');
  if(!dot) return;
  dot.classList.add('show');
  clearTimeout(dot._t);
  dot._t = setTimeout(()=>dot.classList.remove('show'), 2000);
}

// Save current inspection as a named draft (manual)
function saveDraft(){
  const label = S.address ? S.address : prompt('Name this draft:','Untitled Inspection');
  if(label===null) return; // cancelled
  _flushAutoSave();
  const drafts = getDrafts();
  if(activeDraftId){
    const d = drafts.find(x=>x.id===activeDraftId);
    if(d){ d.address = label||'Untitled'; saveDrafts(drafts); }
  }
  toast('✅ Draft saved: '+label,'ok');
  renderDraftModalBody();
}

// Load a draft by id
function loadDraft(id){
  const drafts = getDrafts();
  const d = drafts.find(x=>x.id===id);
  if(!d){ toast('Draft not found','err'); return; }
  try{
    const saved = JSON.parse(d.snapshot);
    Object.assign(S, saved);
    S.photoData = S.photoData||{}; // photos can't persist (blob URLs)
    activeDraftId = id;
    localStorage.setItem(ACTIVE_DRAFT_KEY, id);
    closeDraftManager();
    render();
    toast('✅ Loaded: '+d.address,'ok');
  }catch(e){ toast('Could not load draft','err'); }
}

// Delete a draft
function deleteDraft(id){
  if(!confirm('Delete this draft? This cannot be undone.')) return;
  const drafts = getDrafts().filter(d=>d.id!==id);
  saveDrafts(drafts);
  if(activeDraftId===id){
    activeDraftId = null;
    localStorage.removeItem(ACTIVE_DRAFT_KEY);
  }
  renderDraftModalBody();
  toast('Draft deleted','ok');
}

// Clear current inspection WITHOUT page refresh, keeping Google auth
function confirmClearInspection(){
  if(!confirm('Clear current inspection data? This will remove all form data and photos for this inspection.\n\nYour Google sign-in and saved drafts will NOT be affected.')) return;
  clearCurrentInspection();
}

function clearCurrentInspection(){
  const fresh = getInitialState();
  Object.assign(S, fresh);
  activeDraftId = null;
  localStorage.removeItem(ACTIVE_DRAFT_KEY);
  localStorage.removeItem('sf_master_folder_id');
  // Note: we intentionally keep sf_google_hint so auto-reconnect still works
  closeDraftManager();
  render();
  toast('✅ Inspection cleared — Google still connected','ok');
}

// Open / close draft manager
function openDraftManager(){
  renderDraftModalBody();
  document.getElementById('draft-modal').classList.remove('hidden');
}
function closeDraftManager(){
  const el = document.getElementById('draft-modal');
  if(el) el.classList.add('hidden');
}
function renderDraftModalBody(){
  const drafts = getDrafts();
  const el = document.getElementById('draft-modal-body');
  if(!el) return;
  if(!drafts.length){
    el.innerHTML = '<p style="color:var(--muted);font-size:13px;text-align:center;padding:16px 0">No saved drafts yet.<br>Fill in some data and it will auto-save.</p>';
    return;
  }
  el.innerHTML = drafts.map(d=>{
    const isActive = d.id===activeDraftId;
    const ago = _timeAgo(d.savedAt);
    const bankLabel = (BANKS||[]).find(b=>b.id===d.bank)?.name||d.bank||'—';
    return `<div class="draft-row${isActive?' current':''}">
      <div class="draft-row-info">
        <div class="draft-row-addr">${esc(d.address||'Untitled')} ${isActive?'<span style="color:var(--accent2);font-size:10px">● active</span>':''}</div>
        <div class="draft-row-meta">${bankLabel} · ${ago}</div>
      </div>
      <div class="draft-row-actions">
        ${!isActive?`<button class="draft-act-btn load" onclick="loadDraft('${d.id}')">Load</button>`:''}
        <button class="draft-act-btn del" onclick="deleteDraft('${d.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}
function _timeAgo(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

// Restore active draft on app load (if one exists)
function restoreActiveDraft(){
  if(!activeDraftId) return false;
  const drafts = getDrafts();
  const d = drafts.find(x=>x.id===activeDraftId);
  if(!d) { activeDraftId=null; localStorage.removeItem(ACTIVE_DRAFT_KEY); return false; }
  try{
    const saved = JSON.parse(d.snapshot);
    Object.assign(S, saved);
    S.photoData = S.photoData||{};
    return true;
  }catch(e){ return false; }
}

// ── GOOGLE ─────────────────────────────────────────────────────────────────
let gToken=null, tClient=null, _tokenExpiry=0, _refreshTimer=null;

function initGoogle(){
  if(typeof google==='undefined'){setTimeout(initGoogle,200);return;}
  if(tClient) return;
  tClient=google.accounts.oauth2.initTokenClient({
    client_id:GCL_ID,
    scope:DRIVE_SCOPE,
    callback:r=>{
      if(r.error){
        if(r.error!=='interaction_required'&&r.error!=='consent_required'){
          toast('Sign-in failed: '+r.error,'err');
        }
        return;
      }
      const isFirstSignIn = !gToken;
      gToken=r.access_token;
      const expiresIn = (r.expires_in||3600)*1000;
      _tokenExpiry = Date.now() + expiresIn;
      localStorage.setItem('sf_google_hint', 'connected');
      _scheduleTokenRefresh(expiresIn);
      if(isFirstSignIn){
        // Fetch profile to save email — skips account picker on all future sign-ins
        fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{'Authorization':'Bearer '+gToken}})
          .then(res=>res.json()).then(p=>{
            if(p.email) localStorage.setItem('sf_google_email', p.email);
          }).catch(()=>{});
        toast('✅ Connected to Google!','ok');
        render();
        if(calendarId) loadCalendarEvents();
        if(S.address && S.address.length>=5 && !S.driveRootId) ensureDriveFolderExists();
      }
    }
  });
  if(localStorage.getItem('sf_google_hint')){
    _silentRefresh();
  }
}

function _scheduleTokenRefresh(expiresInMs){
  clearTimeout(_refreshTimer);
  // Refresh at 90% of token lifetime (54 min for a 60 min token)
  const refreshIn = Math.max(expiresInMs * 0.9, 60000);
  _refreshTimer = setTimeout(_silentRefresh, refreshIn);
}

function _silentRefresh(){
  if(!tClient) return;
  try{
    const savedEmail = localStorage.getItem('sf_google_email');
    // login_hint tells Google exactly which account to use — skips the picker entirely
    const opts = {prompt:''};
    if(savedEmail) opts.login_hint = savedEmail;
    tClient.requestAccessToken(opts);
  }catch(e){
    console.warn('Silent refresh failed, will retry on next user action');
  }
}

function signIn(){
  if(!tClient){
    if(typeof google==='undefined'){
      toast('Google loading, please wait a moment...','err');
      setTimeout(signIn, 1500);
      return;
    }
    initGoogle();
    setTimeout(()=>{
      if(tClient) _doSignIn();
      else toast('Could not connect to Google. Check your connection.','err');
    }, 800);
    return;
  }
  _doSignIn();
}

function _doSignIn(){
  const savedEmail = localStorage.getItem('sf_google_email');
  const opts = {prompt:'consent'};
  // Skip the account picker if we already know which account to use
  if(savedEmail) opts.login_hint = savedEmail;
  tClient.requestAccessToken(opts);
}

const WALL_FROM_STANDING={N:'South',S:'North',E:'West',W:'East'};
const STAND_DIR={N:'South Wall',S:'North Wall',E:'West Wall',W:'East Wall'};

// Keep startCompass for heading display in photos nav
function startCompass(){
  if(!window.DeviceOrientationEvent)return;
  if(typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(r=>{if(r==='granted')listenCompass();}).catch(()=>{});
  } else {listenCompass();}
}
function listenCompass(){
  window.addEventListener('deviceorientationabsolute',handleOrient,true);
  window.addEventListener('deviceorientation',handleOrient,true);
  compassActive=true;
}
function handleOrient(e){
  let h=e.alpha||0;
  if(e.webkitCompassHeading) h=e.webkitCompassHeading;
  compassHeading=Math.round(h);
  const needle=document.getElementById('compass-needle');
  if(needle) needle.style.transform=`translateX(-50%) translateY(-100%) rotate(${h}deg)`;
  updateCompassResult();
}
function updateCompassResult(){
  const el=document.getElementById('compass-result-text');
  if(!el)return;
  const btn=document.querySelector('.dir-btn.active');
  if(!btn)return;
  const standing=btn.dataset.dir;
  const wall=STAND_DIR[standing]||'';
  el.innerHTML=`You are on the <strong>${standing} side</strong> → photographing the <strong>${wall}</strong>`;
}

function getAssignments(){
  try{ return JSON.parse(localStorage.getItem('sf_assignments')||'[]'); }catch(e){return [];}
}
function saveAssignments(arr){
  try{ localStorage.setItem('sf_assignments', JSON.stringify(arr)); }catch(e){}
}
function deleteAssignment(id){
  const all = getAssignments().filter(a=>a.id!==id);
  saveAssignments(all);
  render();
}
function markAssignmentDone(id){
  const all = getAssignments();
  const a = all.find(x=>x.id===id);
  if(a) a.status = a.status==='done'?'pending':'done';
  saveAssignments(all);
  render();
}
function callContact(phone){
  if(!phone){toast('No phone number','err');return;}
  window.location.href='tel:'+phone.replace(/\D/g,'');
}
function textContact(phone, name, addr){
  if(!phone){toast('No phone number','err');return;}
  const bankLabel = (BANKS.find(b=>b.id===S.bank)||{}).name||'Spectrum Field Services';
  const msg=encodeURIComponent(`Hi ${name||'there'}, this is your inspector from ${bankLabel}. I am on my way for today's inspection at ${addr||S.address||'your property'}. I will arrive shortly. Please ensure access is available. Thank you! - Briahna Savage`);
  window.location.href='sms:'+phone.replace(/[^0-9]/g,'')+'?body='+msg;
}
function startInspectionFromAssignment(a){
  // Pre-fill state from assignment
  S.address=a.address||'';
  S.city=a.city||'';
  S.state=a.state||'';
  S.propName=a.propName||'';
  S.bank=a.bank||null;
  S.sections=a.sections||[];
  // On-site contact
  S.onSiteName=a.contactName||'';
  S.onSitePhone=a.contactPhone||'';
  S.onSiteEmail=a.contactEmail||'';
  // Management contact
  S.mgmtCompany=a.mgmtCompany||'';
  S.mgmtContact=a.mgmtContact||'';
  S.mgmtPhone=a.mgmtPhone||'';
  S.mgmtEmail=a.mgmtEmail||'';
  // Access notes go into general comments
  if(a.accessNotes) S.neighborhood=(S.neighborhood?S.neighborhood+' ':'')+a.accessNotes;
  S.activeSection=S.sections[0]||null;
  // Mark in progress
  const all=getAssignments();
  const idx=all.findIndex(x=>x.id===a.id);
  if(idx>=0){all[idx].status='inprog';saveAssignments(all);}
  goScreen('facts');
}

  const inspHistory = JSON.parse(localStorage.getItem('sf_inspections')||'[]');
  const todayInspections = inspHistory.filter(i=>i.date===todayKey);
  const doneCount = todayInspections.filter(i=>i.status==='complete').length;
  const inProgCount = todayInspections.filter(i=>i.status==='in-progress').length;
  const totalToday = assignments.length + calendarEvents.filter(e=>!JSON.parse(localStorage.getItem('sf_dismissed_cal')||'[]').includes(e.id)).length;

  return `<div class="pad">
    <div class="dash-header">
      <div>
        <div class="dash-title">Today's Jobs</div>
        <div class="dash-date">${today}</div>
      </div>
    </div>
    <div class="dash-stats">
      <div class="dash-stat ds-today">
        <div class="dash-stat-num">${totalToday}</div>
        <div class="dash-stat-lbl">Today's Inspections</div>
        <div class="dash-stat-sub">${doneCount} completed</div>
      </div>
      <div class="dash-stat ds-done">
        <div class="dash-stat-num">${doneCount}</div>
        <div class="dash-stat-lbl">Completed</div>
        <div class="dash-stat-sub">This session</div>
      </div>
    </div>
    ${calBar}
    ${calCards}
    ${calCards&&assignments.length?'<div class="section-label">Manual Assignments</div>':''}
    ${allEmpty?`
      <div class="empty-dash">
        <div class="empty-icon" style="font-size:40px;margin-bottom:10px">🏢</div>
        <p>No inspections today.<br>Connect your calendar or add manually below.</p>
      </div>`:''}
    ${assignCards}
    <button class="add-assign-btn" id="add-assign-btn">＋ Add Assignment Manually</button>
    ${renderTodayInspections()}
    <div style="height:20px"></div>
    <div class="section-card" style="margin-bottom:14px">
      <h3>⚡ Quick Start</h3>
      <div class="field-row"><div class="field-lbl">Address *</div><input class="field-inp" id="f-addr" placeholder="123 Main St" value="${esc(S.address)}"></div>
      <div class="field-row"><div class="field-lbl">Bank *</div>
      <div class="chip-grid">${BANKS.map(b=>`<button class="chip${S.bank===b.id?' sel':''}" data-bank="${b.id}">${b.name}</button>`).join('')}</div></div>
      <div class="field-row"><div class="field-lbl">Sections *</div>
      <div class="chip-grid">${SECTION_TYPES.filter(s=>{
        if(!S.bank||!cl()?.sections[s.id]) return false;
        // NCB does not use unit sections — apartments, not units
        if(S.bank==='ncb' && (s.id==='occupied'||s.id==='vacant')) return false;
        return true;
      }).map(s=>`<button class="chip${S.sections.includes(s.id)?' sel2':''}" data-section="${s.id}">${s.label}</button>`).join('') || '<span style="color:var(--muted);font-size:12px">Select a bank first</span>'}</div></div>
      <button class="btn-primary" id="start-btn" style="margin-top:12px" ${canStart()?'':'disabled'}>Start Inspection →</button>
      ${S.driveRootId ? `<div style="margin-top:10px;padding:10px 12px;background:var(--green-light);border:1px solid rgba(5,150,105,.2);border-radius:8px;font-size:11px;color:var(--green);display:flex;align-items:center;gap:6px;font-weight:500">
        <span>✅</span><span>Drive folder ready</span>
        <a href="${S.driveLink}" target="_blank" style="margin-left:auto;color:var(--accent);font-size:11px;font-weight:500">Open ↗</a>
      </div>` : gToken && S.address.length>=5 ? `<div style="margin-top:10px;font-size:11px;color:var(--muted);text-align:center">Creating Drive folder…</div>` : ''}

  </div>`;
}

function clearGeneralNotes(){
  if(S.generalNotes && !confirm('Clear all general notes?')) return;
  S.generalNotes='';
  const ta=document.getElementById('general-notes-ta');
  if(ta){ta.value='';updateNotesCharCount(0);}
  triggerAutoSave();
}

function updateNotesCharCount(n){
  const el=document.getElementById('notes-char-count');
  if(el) el.textContent=n+' chars';
}

function _getTimestamp(){
  return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
}

function bindGeneralNotes(){
  const ta=document.getElementById('general-notes-ta');
  if(ta){
    ta.addEventListener('input',e=>{
      S.generalNotes=e.target.value;
      updateNotesCharCount(e.target.value.length);
      // Auto-expand
      ta.style.minHeight='';
      ta.style.minHeight=Math.max(120,ta.scrollHeight)+'px';
      triggerAutoSave();
    });
    // Set initial height
    setTimeout(()=>{
      if(ta.scrollHeight>120) ta.style.minHeight=ta.scrollHeight+'px';
    },0);
  }
  const tsChk=document.getElementById('notes-ts-chk');
  if(tsChk) tsChk.addEventListener('change',e=>{S.generalNotesTimestamp=e.target.checked;triggerAutoSave();});

  document.querySelectorAll('[data-qnote]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const idx=parseInt(btn.dataset.qnote);
      const note=QUICK_NOTES[idx];
      if(!note) return;
      const ta=document.getElementById('general-notes-ta');
      if(!ta) return;
      const ts=S.generalNotesTimestamp?`[${_getTimestamp()}] `:'';
      const line=ts+note.text;
      const cur=ta.value;
      ta.value=cur?(cur.trimEnd()+'\n'+line):line;
      S.generalNotes=ta.value;
      updateNotesCharCount(ta.value.length);
      ta.style.minHeight=Math.max(120,ta.scrollHeight)+'px';
      ta.focus();
      ta.scrollTop=ta.scrollHeight;
      triggerAutoSave();
      // Brief visual feedback
      btn.style.borderColor='var(--accent)';
      btn.style.color='var(--accent)';
      setTimeout(()=>{btn.style.borderColor='';btn.style.color='';},600);
    });
  });
}

// ── UNITS SCREEN ───────────────────────────────────────────────────────────
function renderUnits(){
  const units=S.units.map((u,i)=>{
    const badgeClass=u.status==='occupied'?'badge-occ':u.status==='vacant'?'badge-vac':u.status==='commercial'?'badge-occ':'badge-down';
    const badgeText=u.status==='occupied'?'Occupied':u.status==='vacant'?'Vacant':u.status==='commercial'?'Commercial':'Down';
    const photos=u.photos||{};
    const totalUnitPhotos=Object.values(photos).reduce((s,arr)=>s+arr.length,0);
    const photoSlots=getUnitPhotoSlots(u);
    const doneSlots=photoSlots.filter(s=>photos[s.key]&&photos[s.key].length>0).length;
    const missingSlots=photoSlots.filter(s=>!(photos[s.key]&&photos[s.key].length>0));
    const allPhotoDone = doneSlots===photoSlots.length;
    return `<div class="unit-card">
      <div class="unit-hdr" data-unit="${i}">
        <div>
          <div class="unit-num">${esc(u.label||'Unit')}</div>
          <div class="unit-cond">${u.type||''}${u.baths?' · '+u.baths:''}${u.condition?' · Cond: '+u.condition+'/5':''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;color:${allPhotoDone?'var(--green)':totalUnitPhotos>0?'var(--amber)':'var(--muted)'}">${doneSlots}/${photoSlots.length} 📷</span>
          <span class="unit-badge ${badgeClass}">${badgeText}</span>
          <span style="color:var(--muted);font-size:16px">›</span>
        </div>
      </div>
      ${missingSlots.length>0&&totalUnitPhotos>0?`<div style="padding:0 14px 10px;font-size:11px;color:var(--amber)">⚠ Missing: ${missingSlots.map(s=>s.label).join(', ')}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="pad">
    <div class="bank-note"><strong>📌 Units:</strong> Tap each unit to add photos by room. Photos are labeled automatically.</div>
    <button class="add-unit-btn" id="add-unit-btn">＋ Add Unit</button>
    ${units||'<div style="text-align:center;color:var(--muted);padding:20px;font-size:13px">No units added yet</div>'}
    <div class="pb"></div>
    <button class="btn-primary" onclick="goScreen('photos')" style="margin:16px 0 32px">Next: Photos →</button>
  </div>`;
}

// Define photo slots per unit type
function getUnitPhotoSlots(u){
  const status = u.status||'occupied';
  const isCommercial = status==='commercial'||u.type==='Commercial';
  if(isCommercial){
    return [
      {key:'storefront',    label:'Store Front (Exterior)'},
      {key:'interior',      label:'Interior'},
      {key:'signage',       label:'Signage'},
    ];
  }
  return [
    {key:'gfci',        label:'GFCI Outlet',  hint:'Kitchens & bathrooms within 6ft of water'},
    {key:'co_detector', label:'CO Detector',   hint:'Carbon monoxide detector — each unit'},
    {key:'living_room', label:'Living Room',   hint:''},
    {key:'kitchen',     label:'Kitchen',       hint:''},
    {key:'bathroom',    label:'Bathroom',      hint:''},
    {key:'bedroom',     label:'Bedroom',       hint:''},
  ];
}

  renderUnitModalBody(body, labelTypes, statuses, types, baths, conds, checks);

function bindUnitModal(body, labelTypes, statuses, types, baths, conds, checks, idx){
  // Label type
  body.querySelectorAll('[data-ultype]').forEach(b=>b.addEventListener('click',()=>{
    window._uTemp.labelType=b.dataset.ultype;
    body.querySelectorAll('[data-ultype]').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
  }));
  // Status — re-renders photo slots when changed
  body.querySelectorAll('[data-ustatus]').forEach(b=>b.addEventListener('click',()=>{
    window._uTemp.status=b.dataset.ustatus;
    body.querySelectorAll('[data-ustatus]').forEach(x=>x.classList.remove('sel3'));
    b.classList.add('sel3');
    // Re-render modal to update photo slots
    renderUnitModalBody(body, labelTypes, statuses, types, baths, conds, checks);
    bindUnitModal(body, labelTypes, statuses, types, baths, conds, checks, idx);
  }));
  // Type
  body.querySelectorAll('[data-utype]').forEach(b=>b.addEventListener('click',()=>{
    window._uTemp.type=b.dataset.utype;
    body.querySelectorAll('[data-utype]').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
  }));
  // Baths
  body.querySelectorAll('[data-ubaths]').forEach(b=>b.addEventListener('click',()=>{
    window._uTemp.baths=b.dataset.ubaths;
    body.querySelectorAll('[data-ubaths]').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
  }));
  // Condition
  body.querySelectorAll('[data-ucond]').forEach(b=>b.addEventListener('click',()=>{
    window._uTemp.condition=b.dataset.ucond;
    body.querySelectorAll('[data-ucond]').forEach(x=>x.classList.remove('sel-r'));
    b.classList.add('sel-r');
  }));
  // Checklist
  body.querySelectorAll('[data-ucheck]').forEach(b=>b.addEventListener('click',()=>{
    const k=b.dataset.ucheck;
    if(!window._uTemp.checks) window._uTemp.checks=[];
    if(window._uTemp.checks.includes(k)) window._uTemp.checks=window._uTemp.checks.filter(x=>x!==k);
    else window._uTemp.checks.push(k);
    b.classList.toggle('sel3');
  }));

  // Camera buttons per slot
  body.querySelectorAll('[data-ucam]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    unitCamPendingSlot=b.dataset.ucam;
    unitCamPendingIdx=editingUnit;
    document.getElementById('cam-in').click();
  }));
  body.querySelectorAll('[data-uupl]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    unitCamPendingSlot=b.dataset.uupl;
    unitCamPendingIdx=editingUnit;
    document.getElementById('upl-in').click();
  }));

  // Delete photo from slot
  body.querySelectorAll('[data-uslot]').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();
    const slot=btn.dataset.uslot, pi=parseInt(btn.dataset.uphoto);
    if(window._uTemp.photos[slot]) window._uTemp.photos[slot].splice(pi,1);
    renderUnitModalBody(body, labelTypes, statuses, types, baths, conds, checks);
    bindUnitModal(body, labelTypes, statuses, types, baths, conds, checks, idx);
  }));

  // Save
  const saveBtn=document.getElementById('save-unit-btn');
  if(saveBtn) saveBtn.addEventListener('click',()=>{
    const lbl=document.getElementById('um-label')?.value.trim()||'';
    const notes=document.getElementById('um-notes')?.value||'';
    const bizName=document.getElementById('um-bizname')?.value||'';
    const sqFt=document.getElementById('um-sqft')?.value||'';
    const leaseExp=document.getElementById('um-lease')?.value||'';
    const annualRent=document.getElementById('um-rent')?.value||'';
    const pctNRA=document.getElementById('um-nra')?.value||'';
    const unit={...window._uTemp,label:lbl,notes,bizName,sqFt,leaseExp,annualRent,pctNRA};
    if(editingUnit>=0) S.units[editingUnit]=unit;
    else S.units.push(unit);
    closeUnitModal();
    render();
    toast('✅ Unit saved','ok');
  });

  // Delete unit
  const delBtn=document.getElementById('del-unit-btn');
  if(delBtn) delBtn.addEventListener('click',()=>{
    S.units.splice(editingUnit,1);
    closeUnitModal();
    render();
    toast('Unit removed');
  });
}

// Handle unit photo capture — intercept cam-in/upl-in when unitCamPendingSlot is set
function handleUnitPhoto(files){
  if(!files.length||unitCamPendingSlot===null) return false;
  const slot=unitCamPendingSlot;
  if(!window._uTemp.photos[slot]) window._uTemp.photos[slot]=[];
  Array.from(files).forEach(f=>{
    window._uTemp.photos[slot].push({
      id:Date.now()+''+Math.random(),
      url:URL.createObjectURL(f),
      name:f.name,
      slot:slot,
    });
  });
  unitCamPendingSlot=null;
  unitCamPendingIdx=null;
  // Re-render modal body
  const body=document.getElementById('unit-modal-body');
  if(body&&!document.getElementById('unit-modal').classList.contains('hidden')){
    const labelTypes=['Unit Number','Apartment Letter','Floor + Unit','Commercial Name','Custom Label'];
    const statuses=['occupied','vacant','down','commercial'];
    const types=['Studio','1 Bedroom','2 Bedroom','3 Bedroom','4+ Bedroom','Commercial'];
    const baths=['1 Bath','1.5 Bath','2 Bath','2.5 Bath','3+ Bath'];
    const conds=[1,2,3,4,5];
    const checks=[
      ['Stove present','stove'],['Refrigerator present','fridge'],['Dishwasher present','dishwasher'],
      ['Washer/Dryer present','washerdryer'],['Microwave present','microwave'],
      ['Water damage visible','waterdamage'],['Mold observed','mold'],['Pest evidence','pest'],
      ...(S.bank==='santander'?[['GFCI outlet present','gfci_check'],['CO detector present','co_check']]:
         [['Unit accessible','accessible']]),
    ];
    renderUnitModalBody(body, labelTypes, statuses, types, baths, conds, checks);
    bindUnitModal(body, labelTypes, statuses, types, baths, conds, checks, unitCamPendingIdx);
  }
  return true;
}

function closeUnitModal(){
  document.getElementById('unit-modal').classList.add('hidden');
  editingUnit=null;
  unitCamPendingSlot=null;
}

        </div>
        <div class="photo-cnt">${photos.length>0?photos.length+' 📷':isExp?'▲':'▼'}</div>
      </div>${body}
    </div>`;
  }).join('');

  // Render custom photo slots (added via "custom label" in assign modal)
  const customItems = (S.customPhotoSlots||[]).map(slot=>{
    const data = S.photoData[slot.id]||{};
    const photos = data.photos||[];
    const isComp = photos.length>0, isExp = S.expandedItem===slot.id;
    const thumbs = photos.map(p=>`<div class="thumb">
      <img src="${p.url}">
      <button class="thumb-x" data-item="${slot.id}" data-photo="${p.id}">×</button>
      <input class="thumb-cap" type="text" placeholder="Caption…" value="${esc(p.caption||'')}" data-item="${slot.id}" data-photo="${p.id}" data-photocap="1">

    const body = isExp?`<div class="photo-body">
      ${photos.length>0?`<div class="thumbs">${thumbs}</div>`:''}
      <div class="cam-row">
        <button class="cam-btn pri" data-cam="${slot.id}">📷 Camera</button>
        <button class="cam-btn" data-upl="${slot.id}">🖼 Library</button>
      </div>
      <div class="note-lbl">Caption / Notes</div>
      <textarea class="field-ta" rows="2" placeholder="Add caption..." data-notes="${slot.id}" style="margin-top:4px">${esc(data.note||'')}</textarea>
    </div>`:'';
    return `<div class="photo-item${isComp?' done':''}">
      <div class="photo-hdr" data-expand="${slot.id}">
        <div class="photo-chk${isComp?' done':''}">${isComp?'✓':''}</div>
        <div class="photo-info">
          <div class="photo-lbl">✏️ ${esc(slot.label)}<span style="font-size:10px;color:var(--muted);margin-left:6px">custom</span></div>
          ${!isExp && data.note ? `<div class="caption-preview">💬 ${esc(data.note)}</div>` : ''}
        </div>
        <div class="photo-cnt">${photos.length>0?photos.length+' 📷':isExp?'▲':'▼'}</div>
      </div>${body}
    </div>`;
  }).join('');

  const customSection = (S.customPhotoSlots||[]).length > 0
    ? `<div style="margin-top:4px;margin-bottom:4px"><div style="font-size:10px;color:var(--muted);font-family:var(--mono);padding:4px 2px;letter-spacing:.05em">── CUSTOM SLOTS ──</div>${customItems}</div>`
    : '';

  return `<div class="pad">
    <div class="sec-tabs">${tabs}
      <button class="sec-tab" style="background:var(--accent-light);border-color:var(--accent);color:var(--accent)" id="go-summary">Summary →</button>
    </div>
    ${c?.note?`<div class="bank-note"><strong>📌 ${esc(bankName())}:</strong> ${esc(c.note)}</div>`:''}

    </div>
    <button class="ai-bulk-btn" style="width:100%;justify-content:center;margin-bottom:12px;padding:11px 14px" id="ai-bulk-btn">
      ✨ AI Bulk Upload — auto-sort &amp; caption multiple photos
    </button>
    ${items}
    ${customSection}
    <div class="pb"></div>
  </div>`;
}

// ── PHOTO HANDLING ─────────────────────────────────────────────────────────
function handlePhotos(files){
  if(!files.length) return;

  // No item pre-selected → open assign modal
  if(!pendingItemId){
    openPhotoAssignModal(files);
    return;
  }

  const id=pendingItemId;
  pendingItemId=null;
  if(!S.photoData[id])S.photoData[id]={photos:[],note:''};
  // Get item label for filename
  let itemLabel = id;
  if(S.bank && CL[S.bank]){
    for(const items of Object.values(CL[S.bank].sections||{})){
      const item=(items||[]).find(i=>i.id===id);
      if(item){itemLabel=item.label;break;}
    }
  }
  Array.from(files).forEach(f=>{
    const url=URL.createObjectURL(f);
    S.photoData[id].photos.push({id:Date.now()+''+Math.random(),url,name:f.name});
    autoSavePhotoToPhone(f, itemLabel, '', id);
  });
  S.expandedItem=id; render();
}

// ── PHOTO ASSIGN MODAL ──────────────────────────────────────────────────────
let _pendingAssignFiles = []; // files waiting to be assigned
let _pendingAssignObjectURL = null;

function openPhotoAssignModal(files){
  if(!files.length) return;
  _pendingAssignFiles = Array.from(files);
  const file = _pendingAssignFiles[0];

  // Build dropdown from all photo slots in selected sections
  const c = cl();
  const sel = document.getElementById('photo-assign-select');
  sel.innerHTML = '<option value="">— Select category —</option>';
  if(c){
    S.sections.forEach(sid=>{
      const sLabel = (SECTION_TYPES.find(s=>s.id===sid)||{}).label||sid;
      const items = c.sections[sid]||[];

function confirmPhotoAssign(){

    itemLabel = customLabel;

    if(!S.customPhotoSlots) S.customPhotoSlots = [];
    if(!S.customPhotoSlots.find(s=>s.id===id)){
      S.customPhotoSlots.push({id, label:customLabel});

    const c = cl();

function _buildPhotoName(itemLabel, caption, ext, addr, itemId){
  // Use sequenced name if we have itemId and bank config
  if(itemId && S.bank){
    const photoCount = (S.photoData[itemId]?.photos?.length || 1) - 1; // 0-based index of current photo
    return buildSequencedPhotoName(itemId, itemLabel, caption, ext, photoCount);
  }
  // Fallback for cases without itemId (shouldn't happen in normal flow)
  const nameBase = (caption && caption.trim())
    ? caption.trim().replace(/[^A-Z0-9\s]/gi,'').replace(/\s+/g,'-').toUpperCase().slice(0,50)
    : (itemLabel||'PHOTO').replace(/[^A-Z0-9]/gi,'-').toUpperCase().slice(0,30);
  const ts = Date.now().toString().slice(-4);
  return `${nameBase}-${ts}.${ext}`;
}

function autoSavePhotoToPhone(file, itemLabel, caption, itemId){
  try{
    const addr=(S.address||'property').replace(/[^a-z0-9]/gi,'-').toLowerCase().slice(0,20);
    const ext=file.type.includes('png')?'png':'jpg';
    const fname=_buildPhotoName(itemLabel, caption, ext, addr, itemId);

    // Use Web Share API with files if available (iOS 15+, Android Chrome)
    if(navigator.canShare && navigator.canShare({files:[file]})){
      // Re-create file with a proper name
      const namedFile = new File([file], fname, {type: file.type});
      navigator.share({files:[namedFile], title: fname})
        .catch(()=>{}); // User cancelled share = not an error
      return;
    }

    // Fallback: trigger download (saves to Downloads / Files on Android, prompts save on desktop)
    const url=URL.createObjectURL(file);
    const a=document.createElement('a');
    a.href=url;
    a.download=fname;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{document.body.removeChild(a); URL.revokeObjectURL(url);},1500);
  }catch(e){ console.warn('auto-save error:',e); }
}

const DM_PHOTO_IDS = ['dm','ls','haz'];

function syncDMDescription(){
  const lines = [];
  DM_PHOTO_IDS.forEach(id=>{
    const photos = S.photoData[id]?.photos || [];
    photos.forEach((p)=>{
      if(p.caption && p.caption.trim()) lines.push(p.caption.trim());
    });
    const note = S.photoData[id]?.note;
    if(note && note.trim() && !lines.includes(note.trim())) lines.push(note.trim());
  });
  if(lines.length === 0) return;
  const existing = (S.dmDescription || '').trim();
  const newLines = lines.filter(l => !existing.includes(l));
  if(newLines.length === 0) return;
  S.dmDescription = existing ? existing + '\n' + newLines.join('\n') : newLines.join('\n');
  const ta = document.querySelector('[data-field="dmDescription"]');
  if(ta) ta.value = S.dmDescription;
  triggerAutoSave();
}

        {headers:{'Authorization':'Bearer '+gToken}}

async function driveFolder(name,parentId){
  const b={name,mimeType:'application/vnd.google-apps.folder'};
  if(parentId)b.parents=[parentId];
  const r=await fetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',
    headers:{'Authorization':'Bearer '+gToken,'Content-Type':'application/json'},
    body:JSON.stringify(b)
  });
  if(r.status===401){
    gToken=null;
    // Try silent refresh before giving up
    if(tClient) _silentRefresh();
    throw new Error('Google session expired. Please tap Upload again to re-authenticate.');
  }
  const d=await r.json();
  if(!d.id) throw new Error('Folder error: '+(d.error?.message||name));
  return d.id;
}
async function driveFile(name,blob,parentId){
  const m=JSON.stringify({name,parents:[parentId]});
  const f=new FormData();
  f.append('metadata',new Blob([m],{type:'application/json'}));
  f.append('file',blob);
  return fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{'Authorization':'Bearer '+gToken},body:f});
}

function buildUnitReport(){
  const v=x=>x||'—';
  const yn=x=>x==='yes'?'Yes':x==='no'?'No':'—';
  const lines=['UNITS INSPECTED REPORT','='.repeat(40),''];
  if(!S.units||!S.units.length){ lines.push('No units recorded.'); return lines.join('\n'); }
  S.units.forEach((u,i)=>{
    lines.push(`Unit ${u.label||i+1}`);
    lines.push(`  Type: ${v(u.type)}`);
    lines.push(`  Occupied: ${yn(u.occupied)}`);
    lines.push(`  Accessible: ${yn(u.accessible)}`);
    if(u.notes) lines.push(`  Notes: ${u.notes}`);
    // Custom fields
    if(u.fields && Object.keys(u.fields).length){
      Object.entries(u.fields).forEach(([k,val])=>{ if(val) lines.push(`  ${k}: ${val}`); });
    }
    lines.push('');
  });
  return lines.join('\n');
}

async function uploadToDrive(){
  if(!gToken){signIn();return;}
  if(isUploading)return;
  isUploading=true;
  uploadSteps=[
    {label:'Creating property folder',status:'active'},
    {label:'Creating subfolders',status:'pending'},
    {label:'Uploading inspection report',status:'pending'},
    {label:'Uploading photos',status:'pending'},
    {label:'Uploading unit reports',status:'pending'},
  ];

  try{
    const dateStr = new Date().toISOString().slice(0,10); // YYYY-MM-DD

    const addrPart = [S.address, S.city, S.state].filter(Boolean).join(' ') || 'Unknown Property';
    const rootName = `${bankLabel} - ${addrPart} - ${dateStr}`;
    setStep(0,'active');

    // Find the master '1inspections' folder first
    let masterFolderId = localStorage.getItem('sf_master_folder_id')||null;
    if(!masterFolderId){
      const searchRes = await fetch(
        "https://www.googleapis.com/drive/v3/files?q=name%3D'1Inspection+Photos'+and+mimeType%3D'application%2Fvnd.google-apps.folder'+and+trashed%3Dfalse&fields=files(id,name)",
