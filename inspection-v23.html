      if(found){
        masterFolderId = found.id;
        localStorage.setItem('sf_master_folder_id', masterFolderId);
      } else {
        // If not found, create it so it exists going forward
        masterFolderId = await driveFolder('1Inspection Photos', null);
        localStorage.setItem('sf_master_folder_id', masterFolderId);
        toast('Created "1Inspection Photos" folder in your Drive');
      }
    }

    // Create property folder inside 1inspections
    const rootId=await driveFolder(rootName, masterFolderId);
    setStep(0,'done');
    setStep(1,'active');
    const subs={};
    for(const n of['1. Exterior','2. Interior','3. Deferred Maintenance','4. Units Inspected'])
      subs[n]=await driveFolder(n,rootId);
    setStep(1,'done');
    setStep(2,'active');
    await driveFile(`inspection-report-${(S.address||'property').replace(/\s+/g,'-').toLowerCase()}.txt`,new Blob([buildReport()],{type:'text/plain'}),rootId);
    setStep(2,'done');
    setStep(3,'active');
    // Use getAllPhotosSequenced() so Drive folder already has files in correct vendor order
    const seqPhotos = getAllPhotosSequenced();
    let pc = 0;
    for(const sp of seqPhotos){
      pc++;
      uploadSteps[3].label = `Uploading photos (${pc}/${seqPhotos.length}) — ${sp.filename}`;
      render();
      try{
        const resp = await fetch(sp.photoEntry.url);
        const blob = await resp.blob();
        const ext = blob.type.includes('png') ? 'png' : 'jpg';
        // Use sequenced filename — already has 001_, 002_ prefix + caption-based name
        const fname = sp.filename.replace(/\.\w+$/, '.' + ext); // ensure correct extension
        await driveFile(fname, blob, subs[sp.subfolder] || subs['1. Exterior'] || rootId);
      }catch(e){ console.warn('Photo upload failed:', sp.filename, e); }
    }
    setStep(3,'done');
    setStep(4,'active');
    if(S.units.length>0){
      // Upload unit report text
      const unitReport=buildUnitReport();
      await driveFile('units-inspected.txt',new Blob([unitReport],{type:'text/plain'}),subs['4. Units Inspected']);

      // Upload photos per unit in their own subfolders
      for(const u of S.units){
        if(!u.photos||Object.keys(u.photos).length===0) continue;
        const hasPhotos=Object.values(u.photos).some(arr=>arr&&arr.length>0);
        if(!hasPhotos) continue;

        // Create subfolder for this unit
        const unitLabel=(u.label||'unit').replace(/[^a-z0-9]/gi,'-').toLowerCase();
        const unitFolderId = await driveFolder(`Unit-${unitLabel}`, subs['4. Units Inspected']);

        // Upload each photo slot
        for(const [slot, photos] of Object.entries(u.photos)){
          if(!photos||!photos.length) continue;
          // Convert slot key to readable name: living_room -> Living-Room
          const slotName = slot.replace(/_/g,'-').replace(/\w/g,c=>c.toUpperCase());
          for(let pi=0;pi<photos.length;pi++){
            try{
              const resp=await fetch(photos[pi].url);
              const blob=await resp.blob();
              const ext=blob.type.includes('png')?'png':'jpg';
              // Name: Unit-1-102-Living-Room-1.jpg

              await driveFile(fname, blob, unitFolderId);
            }catch(e){console.warn('Unit photo upload failed:',e);}
          }
        }
      }
    }
    setStep(4,'done');
    S.driveLink=`https://drive.google.com/drive/folders/${rootId}`;
    saveInspectionToHistory();
    toast(`✅ Uploaded to Drive: "${rootName}"`, 'ok');
  }catch(e){console.error(e);toast('Upload failed: '+e.message,'err');}
  finally{isUploading=false;render();}
}

function copyReporterSection(){
  const report = buildReport();
  const marker = '📋 REPORTER — COPY & PASTE THIS SECTION INTO CHAT';
  const endMarker = '══════════════════════════════════════════════════';
  const startIdx = report.indexOf(marker);
  if(startIdx < 0){ toast('No reporter data yet — fill in property facts first','err'); return; }
  // Find the section content between the two dividers
  const afterTitle = report.indexOf('\n', startIdx) + 1;
  // Skip the blank line after the title divider line
  const contentStart = report.indexOf('\n', afterTitle) + 1;
  const contentEnd = report.lastIndexOf(endMarker);
  const section = contentEnd > contentStart ? report.slice(contentStart, contentEnd).trim() : report.slice(contentStart).trim();
  if(!section){ toast('Reporter section is empty — fill in property facts first','err'); return; }
  navigator.clipboard.writeText(section).then(()=>{
    toast('✅ Reporter section copied!','ok');
  }).catch(()=>{
    // Fallback for older iOS
    const ta = document.createElement('textarea');
    ta.value = section;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('✅ Reporter section copied!','ok');
  });
}

  // ── REPORTER COPY SECTION ─────────────────────────────────────────────────
  const amenityList = [

  if(S.numParking)     reporterFields.push(`Number of Parking Spots: ${S.numParking}`);
  const ownerMgr = [S.mgmtCompany, S.mgmtContact].filter(Boolean).join(' / ');

  if(S.roofAccess)     reporterFields.push(`Roof Accessible: ${yn(S.roofAccess)}`);
  if(S.unitsAccessible) reporterFields.push(`Units Accessible: ${yn(S.unitsAccessible)}`);
  if(S.conditionRating) reporterFields.push(`Condition: ${S.conditionRating}`);
  if(S.inaccessibleAreas) reporterFields.push(`Inaccessible Areas: ${S.inaccessibleAreas}`);
  if(S.neighborhood)   reporterFields.push(`Neighborhood: ${S.neighborhood}`);
  if(S.generalNotes && S.generalNotes.trim()) reporterFields.push(`General Notes: ${S.generalNotes.trim()}`);

  if(reporterFields.length){
    lines.push('','','══════════════════════════════════════════════════');
    lines.push('📋 REPORTER — COPY & PASTE THIS SECTION INTO CHAT');
    lines.push('══════════════════════════════════════════════════','');
    reporterFields.forEach(f=>lines.push(f));
    lines.push('','══════════════════════════════════════════════════');
  }

  return lines.join('\n');
}

function parseEventToAssignment(evt){
  const title = evt.summary||'';
  const rawDesc = evt.description||'';

  // Strip HTML tags Google Calendar sends in descriptions
  const stripHtml = (html) => html
    .replace(/<br\s*\/?>/gi,'\n')
    .replace(/<\/p>/gi,'\n')
    .replace(/<p[^>]*>/gi,'')
    .replace(/<[^>]+>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&nbsp;/g,' ').replace(/&#39;/g,"'").replace(/&quot;/g,'"')
    .trim();

  const cleanDesc = stripHtml(rawDesc);

  const getField = (labels) => {
    const arr = Array.isArray(labels)?labels:[labels];
    for(const label of arr){
      const regex = new RegExp(label+'[^\n]*?:\s*([^\n]+)', 'i');
      const m = cleanDesc.match(regex);
      if(m) return m[1].trim();
    }
    return '';
  };

  // Property manager = booking form default fields (First name, Last name, Email, Phone)
  const firstName   = stripHtml(getField(['First name','First'])).split('\n')[0].trim();
  const lastName    = stripHtml(getField(['Last name','Last'])).split('\n')[0].trim();
  const mgmtContact = [firstName,lastName].filter(Boolean).join(' ');
  const mgmtEmail   = getField(['Email address','Email']).split('\n')[0].trim();
  const mgmtPhone   = getField(['Phone number','Phone']).replace(/[^0-9\s\-\.\+\(\)]/g,'').trim();
  const mgmtCompany = getField(['Management company','Management']);

  // On-site contact = custom fields
  const rawContactName  = getField(['Contact Person','Contact Name','Contact','Site contact','Accompanied by']);
  const rawContactPhone = getField(['Contact Phone Number','Contact Phone','Contact phone']);
  const contactEmail    = getField(['Contact email']);
  const contactName     = stripHtml(rawContactName).split('\n')[0].trim();
  const contactPhone    = rawContactPhone.replace(/[^0-9\s\-\.\+\(\)]/g,'').trim();

  // Address
  const address = stripHtml(getField(['What is the property address','Property address','Address'])).split('\n')[0].trim();

  // Bank
  let bankRaw = getField(['Which bank is this inspection for','Bank']).toLowerCase();
  const bankMap={
    'ncb':'ncb','national cooperative bank':'ncb','national co-op':'ncb','national cooperative':'ncb',
    'mt':'mt','m&t':'mt','m&t bank':'mt',
    'santander':'santander',
    'wells':'wells','wells fargo':'wells',
    'habib':'habib','habib bank':'habib','esquire bank':'esquire','esquire':'esquire',
    'other':'other',
  };
  const bank = bankMap[bankRaw.trim()]||null;

  // Access notes
  const accessNotes = stripHtml(getField(['Will there be any access restrictions','Access restrictions','Access'])).split('\n')[0].trim();

  // Sections
  const secRaw = getField(['Which sections need to be inspected','Sections']).toLowerCase();
  const secMap = {exterior:'exterior',interior:'interior',deferred:'deferred',
    'deferred maintenance':'deferred',commercial:'commercial',occupied:'occupied',vacant:'vacant'};
  const sections = secRaw ? secRaw.split(/[,;]+/).map(s=>{
    const t=s.trim();
    for(const [k,v] of Object.entries(secMap)) if(t.includes(k)) return v;
    return null;
  }).filter(Boolean) : [];

  // Time
  const startTime = evt.start?.dateTime || evt.start?.date || '';
  const timeStr = startTime ? new Date(startTime).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';

  return {
    id: 'cal_'+evt.id,
    rawTitle: title,
    address: address || title,
    city:'', state:'',
    propName: getField(['Property name','Property']),
    bank, sections,
    contactName, contactPhone, contactEmail,
    accessNotes,
    mgmtCompany, mgmtContact, mgmtPhone, mgmtEmail,
    time: timeStr, source:'calendar', status:'pending',
    calEventId: evt.id,
  };
}

async function loadCalendarEvents(){
  if(!gToken||!calendarId) return;
  const events = await fetchTodayEvents();
  calendarEvents = events.map(parseEventToAssignment);
  render();
}

function renderCalendarBar(){
  if(!gToken) return `<div class="cal-pill" onclick="signIn()">📅 Connect Google Calendar</div>`;
  if(!calendarId) return `<div class="cal-pill" onclick="openCalendarPicker()">📅 Select Inspection Calendar</div>`;
  return `<div class="cal-pill linked" onclick="openCalendarPicker()">✅ ${esc(calendarName||'Calendar linked')} <span style="opacity:.6">·</span> <span onclick="loadCalendarEvents();event.stopPropagation()" style="text-decoration:underline">Refresh</span></div>`;
}

function renderCalendarEvents(){
  // Filter out dismissed events
  const dismissed = JSON.parse(localStorage.getItem('sf_dismissed_cal')||'[]');
  const visible = calendarEvents.filter(a=>!dismissed.includes(a.id));
  if(!visible.length) return '';

  const cards = visible.map(a=>{
    const isDone = a.status==='done';
    const bankLabel = (BANKS.find(b=>b.id===a.bank)||{}).name||a.bank||'';
    // Show raw title if no bank detected
    const subtitle = a.time?(isDone?'✓ Done':'🕐 '+a.time)+(bankLabel?' · '+bankLabel:''):bankLabel||a.rawTitle||'';
    return `<div class="swipe-wrap" id="swrap-${a.id}">
      <div class="swipe-bg" id="sbg-${a.id}">← Dismiss</div>
      <div class="assign-card swipe-card${isDone?' done':''}" id="scard-${a.id}" data-swipe-id="${a.id}">
        <div class="assign-top">
          <div class="assign-status ${isDone?'done':''}" onclick="toggleCalEventDone('${a.id}')">${isDone?'✓':''}</div>
          <div class="assign-info">
            <div class="assign-addr">${esc(a.address||a.rawTitle||'Event')}</div>
            <div class="assign-bank">${esc(subtitle)}</div>
            ${a.contactName?`<div class="assign-contact" style="margin-top:4px">👤 <strong>${esc(a.contactName)}</strong></div>`:''}
            ${a.contactPhone?`<div style="font-size:11px;color:var(--muted);margin-top:2px">📞 ${esc(a.contactPhone)}</div>`:''}
            ${a.contactEmail?`<div style="font-size:11px;color:var(--muted);margin-top:2px">✉️ ${esc(a.contactEmail)}</div>`:''}
          </div>
          <span style="font-size:10px;background:var(--accent-light);color:var(--accent);padding:2px 6px;border-radius:6px;flex-shrink:0">Cal</span>
        </div>
        <div class="assign-actions">
          ${a.contactPhone?`<button class="act-btn call" onclick="callContact('${a.contactPhone}')">📞 Call</button>`:''}
          ${a.contactPhone?`<button class="act-btn text" onclick="textContact('${a.contactPhone}','${esc(a.contactName||'')}','${esc(a.address||'')}')">💬 Text</button>`:''}
          ${a.contactEmail?`<button class="act-btn" style="border-color:#60a5fa;color:#60a5fa;background:rgba(96,165,250,.08)" onclick="emailGeneralContact('onway','${esc(a.contactEmail)}','${esc(a.contactName||'')}','${esc(a.address||'')}')">✉️ Email</button>`:''}
          <button class="act-btn start" onclick="startInspectionFromAssignment(${JSON.stringify(a).replace(/"/g,'&quot;')})">▶ Start</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const dismissedCount = dismissed.length;
  const restoreBtn = dismissedCount>0 ? `<span style="color:var(--accent);text-decoration:underline;cursor:pointer;font-weight:500" onclick="restoreDismissed()">Restore ${dismissedCount}</span>` : '';

  return `<div class="section-label" style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
    <span>From Calendar (${visible.length})</span>${restoreBtn}
  </div>
  <div class="swipe-hint">← Swipe left to dismiss non-inspection events</div>
  ${cards}`;
}

function toggleCalEventDone(id){
  const evt = calendarEvents.find(e=>e.id===id);
  if(evt) evt.status = evt.status==='done'?'pending':'done';
  render();
}

async function fetchCalendars(){
  if(!gToken) return [];
  try{
    const res = await fetch(
      'https://www.googleapis.com/calendar/v3/users/me/calendarList?maxResults=50',
      {headers:{'Authorization':'Bearer '+gToken}}
    );
    if(res.status===401){gToken=null;toast('Session expired — please reconnect','err');return [];}
    const data = await res.json();
    return (data.items||[]).sort((a,b)=>(a.summary||'').localeCompare(b.summary||''));
  }catch(e){
    console.error('fetchCalendars error',e);
    toast('Could not load calendars','err');
    return [];
  }
}

async function fetchTodayEvents(){
  if(!gToken||!calendarId) return [];
  try{
    const now = new Date();
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
    const end   = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1).toISOString();
    const url = 'https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(calendarId)+'/events'
      +'?timeMin='+start+'&timeMax='+end+'&singleEvents=true&orderBy=startTime&maxResults=50';
    const res = await fetch(url, {headers:{'Authorization':'Bearer '+gToken}});
    if(res.status===401){gToken=null;toast('Session expired — please reconnect','err');return [];}
    const data = await res.json();
    return data.items||[];
  }catch(e){
    console.error('fetchTodayEvents error',e);
    return [];
  }
}

let mapsReady = false;
function initMaps(){ mapsReady = true; }

function getDirections(addr){
  if(!addr.trim()){toast('No address','err');return;}
  const encoded = encodeURIComponent(addr);
  // Opens in Apple Maps on iPhone, Google Maps on Android/desktop
  window.open(`https://maps.google.com/?q=${encoded}`,'_blank');
}

function initAddressAutocomplete(inputId){
  if(!mapsReady||typeof google==='undefined'||!google.maps?.places) return;
  const input = document.getElementById(inputId);
  if(!input) return;
  const ac = new google.maps.places.Autocomplete(input,{
    types:['address'], componentRestrictions:{country:'us'}
  });
  ac.addListener('place_changed',()=>{
    const place = ac.getPlace();
    if(!place.address_components) return;
    const get = types => {
      const c = place.address_components.find(c=>c.types.some(t=>types.includes(t)));
      return c ? c.long_name : '';
    };
    const getShort = types => {
      const c = place.address_components.find(c=>c.types.some(t=>types.includes(t)));
      return c ? c.short_name : '';
    };
    const streetNum = get(['street_number']);
    const route = get(['route']);
    const city = get(['locality','sublocality']);
    const state = getShort(['administrative_area_level_1']);
    const zip = get(['postal_code']);
    const fullAddr = [streetNum,route].filter(Boolean).join(' ');
    if(inputId==='f-addr'||inputId==='am-addr'){
      // Update state
      if(inputId==='f-addr'){
        S.address=fullAddr; S.city=city; S.state=state; S.zip=zip;
      } else {
        if(window._aTemp){ window._aTemp.address=fullAddr; window._aTemp.city=city; window._aTemp.state=state; }
      }
      // Fill city/state fields if present
      const cityEl=document.getElementById(inputId==='f-addr'?'f-city':'am-city');
      const stateEl=document.getElementById(inputId==='f-addr'?'f-state':'am-state');
      if(cityEl) cityEl.value=city;
      if(stateEl) stateEl.value=state;
    }
  });
}

// ── SWIPE TO DISMISS ──────────────────────────────────────────────────────
function initSwipeCards(){
  document.querySelectorAll('[data-swipe-id]').forEach(card=>{
    const id = card.dataset.swipeId;
    const bg = document.getElementById('sbg-'+id);
    let startX=0, currentX=0, isSwiping=false;
    const DISMISS_THRESHOLD = 100;

    function onStart(x){
      startX=x; currentX=0; isSwiping=true;
      card.classList.add('swiping');
    }
    function onMove(x){
      if(!isSwiping) return;
      currentX = Math.min(0, x - startX); // only left swipe
      card.style.transform = `translateX(${currentX}px)`;
      const pct = Math.min(1, Math.abs(currentX)/DISMISS_THRESHOLD);
      if(bg){ bg.style.opacity=pct; bg.classList.toggle('visible', pct>0.3); }
    }
    function onEnd(){
      if(!isSwiping) return;
      isSwiping=false;
      card.classList.remove('swiping');
      if(Math.abs(currentX) >= DISMISS_THRESHOLD){
        // Dismiss it
        card.style.transform = `translateX(-110%)`;
        card.style.opacity = '0';
        card.style.transition = 'transform .3s ease, opacity .3s ease';
        setTimeout(()=>dismissCalEvent(id), 300);
      } else {
        // Snap back
        card.style.transform = '';
        if(bg){ bg.style.opacity='0'; bg.classList.remove('visible'); }
      }
      currentX=0;
    }

    // Touch events
    card.addEventListener('touchstart',e=>onStart(e.touches[0].clientX),{passive:true});
    card.addEventListener('touchmove',e=>onMove(e.touches[0].clientX),{passive:true});
    card.addEventListener('touchend',onEnd);
    // Mouse events (desktop testing)
    card.addEventListener('mousedown',e=>{onStart(e.clientX);
      const mm=ev=>onMove(ev.clientX);
      const mu=()=>{onEnd();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
      document.addEventListener('mousemove',mm);
      document.addEventListener('mouseup',mu);
    });
  });
}

function dismissCalEvent(id){
  try{
    const dismissed = JSON.parse(localStorage.getItem('sf_dismissed_cal')||'[]');
    if(!dismissed.includes(id)) dismissed.push(id);
    localStorage.setItem('sf_dismissed_cal', JSON.stringify(dismissed));
  }catch(e){}
  render();
}

function toast(msg,type=''){
  if(!document||!document.body||typeof document.createElement!=='function') return;
  const ex=document.querySelector('.toast');if(ex)ex.remove();
  const t=document.createElement('div');t.className='toast'+(type?' '+type:'');t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>{ if(t.parentNode) t.remove(); },3500);
}

function reopenInspection(id){

    // Check 48hr window
    const ageMs = Date.now()-(item.savedAt||0);
    if(ageMs > 48*60*60*1000){toast('48 hour edit window has expired','err');return;}

    if(item.fullState){
      const saved = JSON.parse(item.fullState);
      Object.assign(S, saved);
      S.screen='facts';
      render();
      toast('✅ Inspection reopened — make your changes and re-upload','ok');

      // Partial restore - just pre-fill address and bank
      S.address = item.address||'';
      S.city = item.city||'';
      S.bank = null; // they'll need to re-select
      S.screen='setup';
      render();
      toast('Partial restore — please verify your settings','ok');
    }
  }catch(e){toast('Could not reopen: '+e.message,'err');}
}

// All valid photo slots for the current bank/sections
function getPhotoSlotMap(){
  const c = cl();
  if(!c) return [];
  const slots = [];
  S.sections.forEach(sid=>{
    const sLabel = (SECTION_TYPES.find(s=>s.id===sid)||{}).label||sid;
    (c.sections[sid]||[]).forEach(item=>{
      slots.push({
        id: item.id,
        label: item.label,
        section: sLabel,
        sectionId: sid,
        req: item.req||false,
        hint: item.hint||''
      });
    });
  });
  return slots;
}

// Build the system prompt based on vendor caption rules
function buildPhotoAISystemPrompt(slots){
  const bank = (BANKS.find(b=>b.id===S.bank)||{}).name||'Standard';
  const address = S.address||'the subject property';
  const slotList = slots.map((s,i)=>
    `${i+1}. id="${s.id}" | Section: ${s.section} | Label: "${s.label}"${s.req?' (REQUIRED)':''}${s.hint?' | Hint: '+s.hint:''}`
  ).join('\n');

  return `You are a field inspection photo classifier for ${bank} bank inspections.
Property address: ${address}

Your job is to look at a property inspection photo and:
1. Identify which photo slot it belongs to
2. Generate a vendor-compliant caption

AVAILABLE PHOTO SLOTS:
${slotList}

CAPTION RULES (follow exactly):
- Broad view: "Broad view of [address or property name]" — wide shot of whole building
- North/South/East/West walls: "North side of subject" / "South side of [Building A]" — use the direction the BUILDING FACE is facing, NOT the direction you faced to take the photo
- Signage: "[Property name] signage" or "[Tenant name] signage"
- Address verification: "Address verification — [number]" or "[street number] posted on building"
- Roof: "Roof" or "Roof — [specific area if notable]"
- Surrounding/Adjacent: "Adjacent property to the [direction]" or "Surrounding property to the [direction]"
- Street views: "Street view to the [direction]"
- Parking: "Parking lot" or "Parking — [area description]"
- Occupied units: "Occupied Unit [#] – [Room]" e.g. "Occupied Unit 3 – Bathroom" | slot IDs: occ_living, occ_kitchen, occ_bathroom, occ_bedroom
- Vacant units: "Vacant Unit [#] – [Room]" e.g. "Vacant Unit 270 – Kitchen" | slot IDs: vac_living, vac_kitchen, vac_bathroom, vac_bedroom
- Commercial units: "Commercial Unit – [Business Name]"
- Deferred Maintenance: "DM – [Issue] – [Exact Location]" e.g. "DM – Cracked wall – North side of building"
- Life Safety DM: "DM/LS – [Issue] – [Location]"
- Repair Verification: "RV – [Repair done] – [Location]"
- Interior common areas: describe what is shown (lobby, hallway, stairwell, etc.)
- Amenities: describe the specific amenity shown
- All photos should be landscape orientation

Respond ONLY with valid JSON (no markdown, no backticks, no explanation):
{
  "slotId": "<exact id from the slot list above>",
  "slotLabel": "<label of matched slot>",
  "caption": "<vendor-compliant caption>",
  "confidence": <0.0-1.0>,
  "reasoning": "<1 sentence why you chose this slot>"
}

If you cannot confidently identify the photo, use slotId "unknown" and explain in reasoning.`;
}

// Convert file to base64
function fileToBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const b64 = reader.result.split(',')[1];
      resolve(b64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Analyze one photo with Claude vision
async function analyzePhotoWithAI(file, slots, systemPrompt){
  try{
    const b64 = await fileToBase64(file);
    const mediaType = file.type || 'image/jpeg';

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        system: systemPrompt,
        messages: [{
          role: 'user',
          content: [{
            type: 'image',
            source: {type: 'base64', media_type: mediaType, data: b64}
          },{
            type: 'text',
            text: 'Classify this inspection photo and generate a caption. Respond with JSON only.'
          }]
        }]
      })
    });

    if(!response.ok){
      const err = await response.json().catch(()=>({}));
      throw new Error(err.error?.message || 'API error '+response.status);
    }

    const data = await response.json();
    const text = data.content?.[0]?.text||'{}';
    // Strip any markdown fences if present
    const clean = text.replace(/```json|```/g,'').trim();
    return JSON.parse(clean);
  }catch(e){
    console.warn('AI analysis failed for photo:', e.message);
    return {slotId:'unknown', slotLabel:'Unknown', caption:'', confidence:0, reasoning:'Analysis failed: '+e.message};
  }
}

// State for the AI review session
let _aiReviewItems = []; // [{file, objectURL, result, status:'thinking'|'ready'|'accepted'|'skipped', editingSlot, editingCaption}]

// Main entry point — called when bulk upload files are selected
async function startAIBulkReview(files){
  const slots = getPhotoSlotMap();
  if(!slots.length){
    toast('Select a bank and sections first','err');
    return;
  }
  if(!files.length) return;

  // Initialize review items
  _aiReviewItems = Array.from(files).map(f=>({
    file: f,
    objectURL: URL.createObjectURL(f),
    result: null,
    status: 'thinking',
    editingSlot: null,
    editingCaption: null,
  }));

  // Open the modal
  document.getElementById('ai-review-modal').classList.remove('hidden');
  updateAIReviewUI();

  const systemPrompt = buildPhotoAISystemPrompt(slots);

  // Analyze photos one by one (sequential to avoid rate limits)
  for(let i = 0; i < _aiReviewItems.length; i++){
    const item = _aiReviewItems[i];
    document.getElementById('ai-review-prog').textContent =
      `Analyzing ${i+1} of ${_aiReviewItems.length}…`;

    item.result = await analyzePhotoWithAI(item.file, slots, systemPrompt);

    // Auto-accept high-confidence matches (≥0.85) for known slots
    if(item.result.slotId !== 'unknown' && item.result.confidence >= 0.85){
      item.status = 'accepted';
    } else {
      item.status = 'ready';
    }

    updateAIReviewUI();
  }

  document.getElementById('ai-review-prog').textContent =
    `${_aiReviewItems.length} photos analyzed`;
  updateAIFooter();
}

function updateAIReviewUI(){
  const body = document.getElementById('ai-review-body');
  const slots = getPhotoSlotMap();

  body.innerHTML = _aiReviewItems.map((item, i)=>{
    if(item.status === 'thinking'){
      return `<div class="ai-processing-card">
        <div class="ai-spinner"></div>
        <div style="font-size:13px;color:var(--muted)">Analyzing photo ${i+1}…</div>
        <img src="${item.objectURL}" style="width:100%;height:140px;object-fit:cover;border-radius:8px;margin-top:10px">
      </div>`;
    }

    const r = item.result || {};
    const isUnknown = !r.slotId || r.slotId === 'unknown';
    const confidencePct = r.confidence ? Math.round(r.confidence*100) : 0;
    const isAccepted = item.status === 'accepted';
    const isSkipped = item.status === 'skipped';

    // Slot selector for editing
    const slotOptions = slots.map(s=>
      `<option value="${s.id}" ${(item.editingSlot||r.slotId)===s.id?'selected':''}>${s.section} — ${s.label}</option>`
    ).join('');

    const captionVal = item.editingCaption !== null ? item.editingCaption : (r.caption||'');

    return `<div class="ai-card" id="ai-card-${i}" style="${isSkipped?'opacity:.5':''}">
      <img class="ai-card-img" src="${item.objectURL}" alt="Photo ${i+1}">
      <div class="ai-card-content">
        <div class="ai-card-status">
          <span class="ai-badge ${isAccepted?'ai-badge-accepted':isSkipped?'ai-badge-skipped':'ai-badge-ready'}">
            ${isAccepted?'✓ Accepted':isSkipped?'Skipped':'Review'}
          </span>
          ${!isUnknown?`<span class="ai-confidence">${confidencePct}% confidence</span>`:''}
        </div>

        ${isUnknown?`<div style="background:var(--amber-light);border:1px solid rgba(217,119,6,.2);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--amber);margin-bottom:10px">
          ⚠️ Could not identify — please select manually
        </div>`:''}

        <div class="ai-suggestion-box">
          <div class="ai-suggestion-label">Photo slot</div>
          <select class="ai-edit-input" style="margin-top:0;border:none;border-radius:6px;padding:4px 6px;font-size:13px;background:transparent;color:var(--text);cursor:pointer"
            onchange="_aiReviewItems[${i}].editingSlot=this.value;updateAIFooter()">
            <option value="">— Select slot —</option>
            ${slotOptions}
          </select>
        </div>

        <div class="ai-suggestion-box" style="margin-bottom:12px">
          <div class="ai-suggestion-label">Caption</div>
          <input class="ai-edit-input" value="${esc(captionVal)}" placeholder="Caption…"
            oninput="_aiReviewItems[${i}].editingCaption=this.value">
        </div>

        ${r.reasoning?`<div style="font-size:11px;color:var(--muted);margin-bottom:10px;font-style:italic">💭 ${esc(r.reasoning)}</div>`:''}

        <div class="ai-actions">
          <button class="ai-btn-accept${isAccepted?' accepted':''}"
            onclick="toggleAIAccept(${i})">
            ${isAccepted?'✓ Accepted':'Accept'}
          </button>
          <button class="ai-btn-skip" onclick="toggleAISkip(${i})">
            ${isSkipped?'Restore':'Skip'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');

  updateAIFooter();
}

function toggleAIAccept(i){
  const item = _aiReviewItems[i];
  // Must have a slot
  const slotId = item.editingSlot || item.result?.slotId;
  if(!slotId || slotId === 'unknown'){
    toast('Please select a photo slot first','err');
    return;
  }
  item.status = item.status === 'accepted' ? 'ready' : 'accepted';
  updateAIReviewUI();
}

function toggleAISkip(i){
  _aiReviewItems[i].status = _aiReviewItems[i].status === 'skipped' ? 'ready' : 'skipped';
  updateAIReviewUI();
}

function updateAIFooter(){
  const accepted = _aiReviewItems.filter(x=>x.status==='accepted').length;
  const total = _aiReviewItems.length;
  const skipped = _aiReviewItems.filter(x=>x.status==='skipped').length;
  document.getElementById('ai-footer-stats').textContent =
    `${accepted} accepted · ${skipped} skipped · ${total-accepted-skipped} pending`;
  const btn = document.getElementById('ai-apply-btn');
  btn.disabled = accepted === 0;
  btn.textContent = accepted > 0 ? `Apply ${accepted} Photo${accepted!==1?'s':''} →` : 'No photos accepted yet';
}

function applyAllAccepted(){
  const accepted = _aiReviewItems.filter(x=>x.status==='accepted');
  if(!accepted.length) return;

  let applied = 0;
  accepted.forEach(item=>{
    const slotId = item.editingSlot || item.result?.slotId;
    const caption = item.editingCaption !== null ? item.editingCaption : (item.result?.caption||'');

    if(!slotId || slotId === 'unknown') return;

    // Ensure photoData slot exists
    if(!S.photoData[slotId]) S.photoData[slotId] = {photos:[], note:''};

    // Add photo to slot
    const photoEntry = {
      id: Date.now()+''+Math.random()+'_'+applied,
      url: item.objectURL,
      name: item.file.name,
      caption: caption,
      _file: item.file,
    };
    S.photoData[slotId].photos.push(photoEntry);

    // Set note/caption if this is the first for this slot
    if(caption && !S.photoData[slotId].note){
      S.photoData[slotId].note = caption;
    }

    // Live upload to Drive if folder ready
    if(S.driveRootId && gToken){
      // Get item label for filename
      let itemLabel = slotId;
      const c = cl();
      if(c){ for(const items of Object.values(c.sections||{})){ const found=(items||[]).find(i=>i.id===slotId); if(found){itemLabel=found.label;break;} } }
      liveUploadPhoto(item.file, itemLabel, slotId, caption);
    }

    // Sync DM if applicable
    if(DM_PHOTO_IDS.includes(slotId) || slotId.startsWith('dm')) syncDMDescription();

    applied++;
  });

  triggerAutoSave();
  closeAIReview();
  render();

  // Navigate to photos screen to show results
  if(S.screen !== 'photos') goScreen('photos');
  toast(`✅ ${applied} photo${applied!==1?'s':''} assigned by AI`,'ok');
}

function closeAIReview(){
  document.getElementById('ai-review-modal').classList.add('hidden');
  // Don't revoke objectURLs — they're now referenced in photoData
  _aiReviewItems = [];
}

// Load/save caption library state (favorites + recents)
function loadCaptionLib(){
  try{
    const saved = localStorage.getItem('sf_caption_lib');
    if(saved){
      const data = JSON.parse(saved);
      // Merge saved favorites into presets
      (data.favs||[]).forEach(id=>{
        const p = DM_CAPTION_PRESETS.find(x=>x.id===id);
        if(p) p.fav = true;
      });
      return {recents: data.recents||[], custom: data.custom||[]};
    }
  }catch(e){}
  return {recents:[], custom:[]};
}

function saveCaptionLib(recents, custom){
  const favIds = DM_CAPTION_PRESETS.filter(p=>p.fav).map(p=>p.id);
  localStorage.setItem('sf_caption_lib', JSON.stringify({favs:favIds, recents, custom}));
}

let _captionLibState = loadCaptionLib();

function toggleCaptionFav(id){
  const p = DM_CAPTION_PRESETS.find(x=>x.id===id);
  if(p) p.fav = !p.fav;
  saveCaptionLib(_captionLibState.recents, _captionLibState.custom);
  renderCaptionLibModal();
}

function insertCaption(text, targetInputId){
  const el = document.getElementById(targetInputId);
  if(!el) return;
  el.value = text;
  el.focus();
  el.dispatchEvent(new Event('input', {bubbles:true}));
  // Add to recents
  _captionLibState.recents = [text, ..._captionLibState.recents.filter(r=>r!==text)].slice(0,20);
  saveCaptionLib(_captionLibState.recents, _captionLibState.custom);
  closeCaptionLib();
}

function renderCaptionLibModal(){
  const q = _captionLibSearch.toLowerCase();
  const allItems = DM_CAPTION_PRESETS;

  // Filter
  const filtered = q
    ? allItems.filter(p => p.text.toLowerCase().includes(q) || p.tags.some(t=>t.includes(q)))
    : allItems;

  const favs = filtered.filter(p=>p.fav);
  const recents = (q ? [] : (_captionLibState.recents||[]).slice(0,8));
  const rest = filtered.filter(p=>!p.fav);

  function renderItem(p, isRecent){
    const text = isRecent ? p : p.text;
    const id = isRecent ? null : p.id;
    return `<div class="cap-lib-item" onclick="insertCaption('${esc(text)}','${_captionLibTargetId||''}')">

// ── REPORTER EXPORT PACKAGE ───────────────────────────────────────────────────
// Generates a structured export that the reporter can paste directly into
// their report system. Photos are listed in vendor sequence order with filenames.

function buildReporterExportPackage() {
  const bank = (BANKS.find(b=>b.id===S.bank)||{}).name || 'Standard';
  const addr = [S.address, S.city, S.state, S.zip].filter(Boolean).join(' ');
  const dateStr = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  const lines = [];
  lines.push('╔══════════════════════════════════════════════════════════════╗');
  lines.push('  REPORTER EXPORT PACKAGE');
  lines.push(`  ${bank} — ${addr}`);
  lines.push(`  Inspected: ${dateStr}`);
  lines.push('╚══════════════════════════════════════════════════════════════╝');
  lines.push('');

  // ── PROPERTY FACTS ─────────────────────────────────────────────────────────
  lines.push('━━ PROPERTY INFORMATION ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  const facts = [
    ['Property Address', addr],
    ['Property Name', S.propName],
    ['Property Type', S.propType],
    ['Number of Buildings', S.numBuildings],
    ['Number of Units', S.numUnits],
    ['Number of Businesses', S.numBusinesses],
    ['Business Tenant Names', S.businessTenants],
    ['Floors', S.numFloors],
    ['Year Built', S.yearBuilt],
    ['Number of Parking Spots', S.numParking],
    ['Garage Spaces', S.garageSpaces],
    ['Storage Rooms', S.storageRooms],
    ['Amenities', [...(S.amenityChips||[]).map(id=>({laundry:'Laundry',secure_access:'Secure Access',gym:'Gym',pool:'Pool',elevator_amen:'Elevator',intercom:'Intercom',bike_storage:'Bike Storage',rooftop:'Rooftop',courtyard:'Courtyard',lobby:'Lobby',package_room:'Package Room',ev_charging:'EV Charging'}[id]||id)), S.amenities].filter(Boolean).join(', ')],
  ];
  facts.forEach(([k,v])=>{ if(v) lines.push(`${k}: ${v}`); });
  lines.push('');

  // ── MANAGEMENT ─────────────────────────────────────────────────────────────
  lines.push('━━ MANAGEMENT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  const mgmt = [
    ['Owner / Manager', S.mgmtCompany],
    ['Property Manager', S.mgmtContact],
    ['Manager Phone', S.mgmtPhone],
    ['Manager Email', S.mgmtEmail],
    ['On-Site Contact', S.contactPerson],
    ['Contact Phone', S.contactPhone],
    ['Borrower', S.borrower],
    ['Borrower Contact', S.borrowerContact],
    ['Lender', S.lender],
    ['Ownership Type', S.ownershipType],
    ['Rent Roll Provided By', S.rentRoll],
  ];
  mgmt.forEach(([k,v])=>{ if(v) lines.push(`${k}: ${v}`); });
  lines.push('');

  // ── INSPECTION ACCESS ──────────────────────────────────────────────────────
  lines.push('━━ INSPECTION ACCESS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  const access = [
    ['Roof Accessible', S.roofAccess],
    ['Units Accessible', S.unitsAccessible],
    ['Inaccessible Areas', S.inaccessibleAreas],
    ['Management Visit Frequency', S.mgmtVisitFreq],
  ];
  access.forEach(([k,v])=>{ if(v) lines.push(`${k}: ${v}`); });
  lines.push('');

  // ── NEIGHBORHOOD ───────────────────────────────────────────────────────────
  if(S.neighborhood) {
    lines.push('━━ NEIGHBORHOOD ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
    lines.push(S.neighborhood);
    lines.push('');
  }

  // ── PHOTO MANIFEST (vendor sequence order) ─────────────────────────────────
  lines.push('━━ PHOTO MANIFEST — UPLOAD ORDER ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  lines.push('Photos are listed in vendor-required upload sequence.');
  lines.push('Filename = what the file will be named in Google Drive.');
  lines.push('');

  const seqPhotos = getAllPhotosSequenced();
  if(seqPhotos.length) {
    let currentSection = '';
    seqPhotos.forEach(sp => {
      if(sp.subfolder !== currentSection) {
        currentSection = sp.subfolder;
        lines.push(`  [ ${currentSection} ]`);
      }
      const caption = sp.photoEntry.caption || sp.photoEntry.note || '(no caption)';
      lines.push(`  ${sp.filename.replace(/\.\w+$/, '')} | ${caption}`);
    });
  } else {
    lines.push('  No photos captured yet.');
  }
  lines.push('');
  lines.push(`  Total photos: ${seqPhotos.length}`);
  lines.push('');

  // ── DEFERRED MAINTENANCE ───────────────────────────────────────────────────
  const dmPhotos = seqPhotos.filter(sp => ['dm','ls','haz','hk','tr'].includes(sp.itemId));
  if(dmPhotos.length || S.dmDescription) {
    lines.push('━━ DEFERRED MAINTENANCE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
    dmPhotos.forEach(sp => {
      const caption = sp.photoEntry.caption || '(no caption)';
      lines.push(`• ${caption}`);
    });
    if(S.dmDescription && S.dmDescription.trim()){
      lines.push('');
      lines.push('Additional DM Notes:');
      lines.push(S.dmDescription.trim());
    }
    lines.push('');
  }

  // ── GENERAL NOTES ──────────────────────────────────────────────────────────
  if(S.generalNotes && S.generalNotes.trim()) {
    lines.push('━━ GENERAL NOTES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
    lines.push(S.generalNotes.trim());
    lines.push('');
  }

  // ── UNITS SUMMARY ──────────────────────────────────────────────────────────
  if((S.units||[]).length) {
    lines.push('━━ UNITS INSPECTED ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
    (S.units||[]).forEach(u => {
      const status = u.status||'Unknown';
      const type = u.unitType||'';
      const cond = u.condition||'';
      lines.push(`Unit ${u.label||'?'} — ${status}${type?' | '+type:''}${cond?' | Condition: '+cond:''}`);
      if(u.notes) lines.push(`  Notes: ${u.notes}`);
    });
    lines.push('');
  }

  lines.push('══════════════════════════════════════════════════════════════');
  lines.push('END OF REPORTER EXPORT PACKAGE');
  lines.push('══════════════════════════════════════════════════════════════');

  return lines.join('\n');
}

async function copyReporterExport() {
  const text = buildReporterExportPackage();
  try {
    await navigator.clipboard.writeText(text);
    toast('✅ Full reporter package copied!', 'ok');
  } catch(e) {
    // iOS fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('✅ Reporter package copied!', 'ok');
  }
}

async function downloadReporterExport() {
  const text = buildReporterExportPackage();
  const addr = (S.address||'inspection').replace(/[^a-z0-9]/gi,'-').toLowerCase().slice(0,25);
  const date = new Date().toISOString().slice(0,10);
  const fname = `reporter-export-${addr}-${date}.txt`;
  const blob = new Blob([text], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1500);
  toast('📄 Reporter export downloaded', 'ok');
}

// ── INIT ───────────────────────────────────────────────────────────────────
// Initialize Google immediately when script runs
initGoogle();

window.addEventListener('load',()=>{
  // Restore active draft if one exists (survives refresh/crash)
  const restored = restoreActiveDraft();
  render();
  if(restored){
    toast('🔄 Inspection restored from auto-save','ok');
  }
  // Calendar state already initialized at top level
  if(calendarId && window.gToken) loadCalendarEvents();
});
render();
</script>
