<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inspection">
<meta name="theme-color" content="#0f1117">
<title>Field Inspection</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a3048;--accent:#4f8ef7;--accent2:#7c5cfc;--green:#22d3a0;--amber:#f59e0b;--red:#f43f5e;--text:#e8eaf2;--muted:#7a84a0;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text)}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.header{background:linear-gradient(135deg,#1a2040 0%,#0f1117 100%);border-bottom:1px solid var(--border);padding:max(env(safe-area-inset-top),16px) 20px 12px;position:relative;z-index:100;flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:15px;font-weight:600;letter-spacing:.02em}
.header .sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.back-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font)}
.progress-bar{height:3px;background:var(--border);margin-top:10px;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s ease}
.content{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.setup-logo{text-align:center;margin-bottom:28px}
.setup-logo .icon{font-size:40px;margin-bottom:8px}
.setup-logo h2{font-size:22px;font-weight:600}
.setup-logo p{color:var(--muted);font-size:13px;margin-top:4px}
.field-group{margin-bottom:20px}
.field-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.field-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:16px;font-family:var(--font);outline:none;-webkit-appearance:none}
.field-input:focus{border-color:var(--accent)}
.field-input::placeholder{color:var(--muted)}
.bank-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bank-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:10px 12px;border-radius:10px;font-size:12px;cursor:pointer;font-family:var(--font);text-align:left;line-height:1.3}
.bank-btn.active{background:rgba(79,142,247,.12);border-color:var(--accent);color:var(--accent);font-weight:600}
.section-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.section-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:10px 12px;border-radius:10px;font-size:12px;cursor:pointer;font-family:var(--font);text-align:left}
.section-btn.active{background:rgba(124,92,252,.12);border-color:var(--accent2);color:var(--accent2);font-weight:600}
.start-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;padding:16px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:8px}
.start-btn:disabled{opacity:.3}
.section-tabs{display:flex;gap:6px;overflow-x:auto;padding:0 0 2px;scrollbar-width:none}
.section-tabs::-webkit-scrollbar{display:none}
.tab{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:20px;font-size:11px;white-space:nowrap;cursor:pointer;font-family:var(--font);flex-shrink:0}
.tab.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:600}
.tab .cnt{background:rgba(255,255,255,.25);border-radius:10px;padding:1px 5px;margin-left:4px;font-size:10px}
.tab.done{border-color:var(--green);color:var(--green)}
.tab.done.active{background:var(--green);color:white}
.bank-banner{background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.2);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:#a0b4d8;line-height:1.5}
.bank-banner strong{color:var(--accent)}
.photo-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.photo-item.completed{border-color:rgba(34,211,160,.35)}
.photo-item.req-item{border-left:3px solid var(--amber)}
.photo-item.req-item.completed{border-left:3px solid var(--green)}
.photo-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.photo-status{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
.photo-status.done{background:var(--green);border-color:var(--green);color:white}
.photo-info{flex:1}
.photo-label{font-size:13px;font-weight:500}
.req-badge{background:rgba(245,158,11,.15);color:var(--amber);font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:6px;letter-spacing:.05em;text-transform:uppercase}
.photo-hint{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.photo-count{font-size:11px;color:var(--muted);font-family:var(--mono);flex-shrink:0}
.photo-body{padding:0 14px 14px;border-top:1px solid var(--border)}
.thumbnails{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 10px}
.thumb{position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;background:var(--surface2);border:1px solid var(--border)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.7);border:none;color:white;width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
.capture-row{display:flex;gap:8px}
.cam-btn{flex:1;background:var(--surface2);border:1px dashed var(--border);color:var(--muted);padding:12px;border-radius:10px;font-size:13px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px}
.cam-btn.primary{background:rgba(79,142,247,.1);border-color:var(--accent);color:var(--accent)}
.notes-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-top:10px;margin-bottom:4px}
.notes-area{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;font-family:var(--font);resize:none;outline:none;line-height:1.5;-webkit-appearance:none}
.notes-area:focus{border-color:var(--accent2)}
.notes-area::placeholder{color:var(--muted)}
.summary-header{text-align:center;margin-bottom:24px}
.summary-header .big-check{font-size:48px;margin-bottom:8px}
.summary-header h2{font-size:20px;font-weight:600}
.summary-header p{color:var(--muted);font-size:13px;margin-top:4px}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.summary-card h3{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;font-weight:600}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-label{font-size:13px}
.stat-val{font-size:13px;font-family:var(--mono);color:var(--accent)}
.stat-val.warn{color:var(--amber)}
.stat-val.ok{color:var(--green)}
.missing-item{font-size:12px;color:var(--amber);padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.missing-item:last-child{border-bottom:none}
.export-btn{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.export-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:white}
.export-btn.green{background:linear-gradient(135deg,#16a34a,#15803d);border:none;color:white}
.export-btn:disabled{opacity:.5;cursor:not-allowed}
.hidden-input{display:none}
.pb{padding-bottom:env(safe-area-inset-bottom,20px)}
.drive-status{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:12px}
.drive-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.drive-dot.connected{background:var(--green)}
.drive-dot.disconnected{background:var(--muted)}
.drive-dot.uploading{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* Folder preview card */
.folder-preview{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.folder-preview h3{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;font-weight:600}
.folder-root{font-size:13px;color:var(--text);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.folder-child{font-size:12px;color:var(--muted);padding:4px 0 4px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;justify-content:space-between}
.folder-child:last-child{border-bottom:none}
.folder-child .badge{background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:10px;padding:2px 6px;font-family:var(--mono);color:var(--accent)}
/* Upload progress */
.upload-progress{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.upload-progress h3{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;font-weight:600}
.upload-step{font-size:12px;padding:4px 0;display:flex;align-items:center;gap:8px;color:var(--muted)}
.upload-step.done{color:var(--green)}
.upload-step.active{color:var(--amber)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e2333;border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:12px;font-size:13px;z-index:999;max-width:90vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div id="app">
  <div class="header" id="header">
    <div class="header-top">
      <div>
        <h1 id="header-title">🏢 Inspection Setup</h1>
        <div class="sub" id="header-sub">Configure your inspection</div>
      </div>
      <button class="back-btn" id="back-btn" style="display:none" onclick="goBack()">Setup</button>
    </div>
    <div class="progress-bar" id="progress-bar" style="display:none">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>
<input type="file" accept="image/*" capture="environment" multiple class="hidden-input" id="camera-input">
<input type="file" accept="image/*" multiple class="hidden-input" id="upload-input">

const GOOGLE_CLIENT_ID = '608140101331-krho9nv7021d0c262b0j199omb8m1jss.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';

// Section → folder mapping
// exterior, commercial go into "1. Exterior"
// interior, occupied, vacant go into "2. Interior"
// deferred goes into "3. Deferred Maintenance"
const SECTION_FOLDER_MAP = {
  exterior:   '1. Exterior',
  commercial: '1. Exterior',
  interior:   '2. Interior',
  occupied:   '2. Interior',
  vacant:     '2. Interior',
  deferred:   '3. Deferred Maintenance',

};

// ── GOOGLE AUTH ───────────────────────────────────────────────────────────────
let googleToken = null;
let tokenClient = null;

function initGoogleAuth() {
  if(typeof google === 'undefined') { setTimeout(initGoogleAuth, 500); return; }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: (resp) => {
      if(resp.error) { showToast('Sign-in failed: ' + resp.error, 'error'); return; }
      googleToken = resp.access_token;
      showToast('✅ Connected to Google Drive!', 'success');
      render();
    }
  });
}

function signInGoogle() {
  if(!tokenClient) { showToast('Google auth loading, try again in a moment', 'error'); return; }
  tokenClient.requestAccessToken();

    exterior:[{id:"broad",label:"Broad View / Glamour Shot",req:true},{id:"signage",label:"Signage",req:true},{id:"roof",label:"Roof",req:false},{id:"north",label:"Exterior – North Side",req:false},{id:"south",label:"Exterior – South Side",req:false},{id:"east",label:"Exterior – East Side",req:false},{id:"west",label:"Exterior – West Side",req:false},{id:"ingress",label:"Ingress / Egress",req:false},{id:"parking",label:"Parking Lot",req:false},{id:"grounds",label:"Grounds / Landscaping",req:false},{id:"street",label:"Street Views",req:false}],
    interior:[{id:"hvac",label:"HVAC",req:false},{id:"common_int",label:"Common Areas – Interior",req:false},{id:"lobby",label:"Lobby / Office",req:false}],
    deferred:[{id:"dm_items",label:"Deferred Maintenance Items",req:false}],
    occupied:[{id:"occ_living",label:"Living Room",req:false},{id:"occ_kitchen",label:"Kitchen",req:false},{id:"occ_bath",label:"Bathroom",req:false},{id:"occ_bed",label:"Bedroom",req:false}],
    vacant:[{id:"vac_living",label:"Living Room",req:false},{id:"vac_kitchen",label:"Kitchen",req:false},{id:"vac_bath",label:"Bathroom",req:false},{id:"vac_bed",label:"Bedroom",req:false}],
  }},
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {screen:'setup',bank:null,sections:[],address:'',propName:'',activeSection:null,photoData:{},expandedItem:null};
let pendingItemId = null;
let isUploading = false;
let uploadSteps = [];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const cl = () => state.bank ? CHECKLISTS[state.bank] : null;
const bankName = () => (BANKS.find(b=>b.id===state.bank)||{}).name||'';
const currentItems = () => { const c=cl(); if(!c||!state.activeSection) return []; return c.sections[state.activeSection]||[]; };
const sectionDone = sid => (cl()?.sections[sid]||[]).filter(i=>(state.photoData[i.id]?.photos||[]).length>0).length;
const sectionTotal = sid => (cl()?.sections[sid]||[]).length;
const totalPhotos = () => Object.values(state.photoData).reduce((s,d)=>s+(d.photos||[]).length,0);
const allItems = () => state.sections.flatMap(s=>cl()?.sections[s]||[]);
const completedItems = () => allItems().filter(i=>(state.photoData[i.id]?.photos||[]).length>0).length;
const progress = () => { const a=allItems().length; return a?(completedItems()/a)*100:0; };
const canStart = () => state.bank && state.sections.length>0 && state.address.trim();
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const missingRequired = () => {
  const c=cl(); if(!c) return [];
  const out=[];
  state.sections.forEach(sid=>{
    (c.sections[sid]||[]).forEach(item=>{
      if(item.req&&!(state.photoData[item.id]?.photos?.length>0)){
        out.push(`${(SECTION_TYPES.find(s=>s.id===sid)||{}).label||sid}: ${item.label}`);
      }
    });
  });
  return out;
};

// Count photos per Drive folder
function photoCountByFolder() {
  const counts = {'1. Exterior':0,'2. Interior':0,'3. Deferred Maintenance':0};
  state.sections.forEach(sid => {
    const folderName = SECTION_FOLDER_MAP[sid] || '1. Exterior';
    (cl()?.sections[sid]||[]).forEach(item => {
      counts[folderName] += (state.photoData[item.id]?.photos||[]).length;
    });
  });
  return counts;
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg, type='') {
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast'+(type?' '+type:'');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}

// ── DRIVE API HELPER ──────────────────────────────────────────────────────────
async function driveCreateFolder(name, parentId) {
  const body = {name, mimeType:'application/vnd.google-apps.folder'};
  if(parentId) body.parents = [parentId];
  const res = await fetch('https://www.googleapis.com/drive/v3/files', {
    method:'POST',
    headers:{'Authorization':'Bearer '+googleToken,'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if(!data.id) throw new Error('Failed to create folder: ' + name);
  return data.id;
}

async function driveUploadFile(name, blob, parentId) {
  const meta = JSON.stringify({name, parents:[parentId]});
  const form = new FormData();
  form.append('metadata', new Blob([meta],{type:'application/json'}));
  form.append('file', blob);
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
    method:'POST',
    headers:{'Authorization':'Bearer '+googleToken},
    body: form
  });
  return res.json();
}

// ── MAIN UPLOAD ───────────────────────────────────────────────────────────────
async function uploadToDrive() {
  if(!googleToken) { signInGoogle(); return; }
  if(isUploading) return;
  isUploading = true;
  uploadSteps = [
    {label:'Creating property folder', status:'active'},
    {label:'Creating subfolders (Exterior, Interior, DM)', status:'pending'},
    {label:'Uploading inspection report', status:'pending'},
    {label:'Uploading photos', status:'pending'},
  ];
  render();

  try {
    const dateStr = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const folderName = `${state.address||'Inspection'} – ${dateStr}`;

    // Step 1: Root folder
    setStep(0, 'active');
    const rootId = await driveCreateFolder(folderName, null);
    setStep(0, 'done');

    // Step 2: Subfolders
    setStep(1, 'active');
    const subFolders = {};
    for(const name of ['1. Exterior','2. Interior','3. Deferred Maintenance']) {
      subFolders[name] = await driveCreateFolder(name, rootId);
    }
    setStep(1, 'done');

    // Step 3: Report
    setStep(2, 'active');
    const reportBlob = new Blob([buildReportText()], {type:'text/plain'});
    const fname = `inspection-report-${(state.address||'property').replace(/\s+/g,'-').toLowerCase()}.txt`;
    await driveUploadFile(fname, reportBlob, rootId);
    setStep(2, 'done');

    // Step 4: Photos — sorted into correct subfolders
    setStep(3, 'active');
    let photoCount = 0;
    const totalPics = totalPhotos();

    for(const sid of state.sections) {
      const folderName = SECTION_FOLDER_MAP[sid] || '1. Exterior';
      const folderId = subFolders[folderName];
      const items = cl()?.sections[sid]||[];

      for(const item of items) {
        const photos = state.photoData[item.id]?.photos||[];
        for(let pi=0; pi<photos.length; pi++) {
          photoCount++;
          uploadSteps[3].label = `Uploading photos (${photoCount}/${totalPics})`;
          render();

          try {
            const resp = await fetch(photos[pi].url);
            const blob = await resp.blob();
            const ext = blob.type.includes('png')?'png':'jpg';
            const photoName = `${item.label.replace(/[^a-z0-9]/gi,'-').toLowerCase()}-${pi+1}.${ext}`;
            await driveUploadFile(photoName, blob, folderId);
          } catch(e) { console.warn('Photo failed:', e); }
        }
      }
    }
    setStep(3, 'done');

    showToast(`✅ All done! Uploaded to "${folderName}"`, 'success');
  } catch(e) {
    console.error(e);
    showToast('Upload failed: ' + e.message, 'error');
  } finally {
    isUploading = false;
    render();
  }
}

function setStep(idx, status) {
  uploadSteps[idx].status = status;
  if(status==='done' && uploadSteps[idx+1]) uploadSteps[idx+1].status='active';
  render();
}

// ── SAVE TO PHONE ─────────────────────────────────────────────────────────────
function saveToPhone() {
  const blob = new Blob([buildReportText()], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `inspection-${(state.address||'property').replace(/\s+/g,'-').toLowerCase()}-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  showToast('💾 Report saved to device!', 'success');
}

function buildReportText() {
  const c = cl();
  const lines = [`INSPECTION REPORT`,``,`Property: ${state.propName||state.address}`,`Address: ${state.address}`,`Bank: ${bankName()}`,`Date: ${new Date().toLocaleString()}`,`Total Photos: ${totalPhotos()}`,``];
  state.sections.forEach(sid=>{
    const lbl=(SECTION_TYPES.find(s=>s.id===sid)||{}).label||sid;
    lines.push(`--- ${lbl.toUpperCase()} ---`);
    (c?.sections[sid]||[]).forEach(item=>{
      const d=state.photoData[item.id]||{};
      const cnt=(d.photos||[]).length;
      lines.push(`[${cnt>0?'✓':' '}] ${item.label}${item.req?' (REQUIRED)':''} — ${cnt} photo(s)`);
      if(d.note) lines.push(`    Note: ${d.note}`);
    });
    lines.push('');
  });
  const miss=missingRequired();
  if(miss.length){ lines.push('MISSING REQUIRED PHOTOS:'); miss.forEach(m=>lines.push(`  ⚠ ${m}`)); }
  return lines.join('\n');
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  updateHeader();
  const content = document.getElementById('content');
  if(state.screen==='setup') content.innerHTML = renderSetup();
  else if(state.screen==='inspect') content.innerHTML = renderInspect();
  else if(state.screen==='summary') content.innerHTML = renderSummary();
  bindEvents();
}

function updateHeader() {
  document.getElementById('header-title').textContent = state.screen==='setup'?'🏢 Inspection Setup':state.screen==='summary'?'✅ Inspection Summary':(state.propName||state.address);
  document.getElementById('header-sub').textContent = state.screen==='setup'?'Configure your inspection':state.screen==='summary'?`${totalPhotos()} photos captured`:`${bankName()} · ${completedItems()}/${allItems().length} items`;
  const bb=document.getElementById('back-btn');
  bb.style.display=state.screen!=='setup'?'':'none';
  bb.textContent=state.screen==='summary'?'← Back':'Setup';
  document.getElementById('progress-bar').style.display=state.screen==='inspect'?'':'none';
  if(state.screen==='inspect') document.getElementById('progress-fill').style.width=progress()+'%';
}

function renderSetup() {
  const c=cl();
  const sectionBtns=SECTION_TYPES.filter(s=>state.bank&&c?.sections[s.id])
    .map(s=>`<button class="section-btn${state.sections.includes(s.id)?' active':''}" data-section="${s.id}">${s.label}</button>`).join('');
  return `<div>
    <div class="setup-logo"><div class="icon">📋</div><h2>Field Inspection</h2><p>Guided photo checklist by bank</p></div>
    <div class="field-group"><div class="field-label">Property Address *</div>
    <input class="field-input" id="inp-address" placeholder="123 Main St, New York, NY 10001" value="${esc(state.address)}"></div>
    <div class="field-group"><div class="field-label">Property Name (optional)</div>
    <input class="field-input" id="inp-propname" placeholder="e.g. Riverside Apartments" value="${esc(state.propName)}"></div>
    <div class="field-group"><div class="field-label">Select Bank *</div>
    <div class="bank-grid">${BANKS.map(b=>`<button class="bank-btn${state.bank===b.id?' active':''}" data-bank="${b.id}">${b.name}</button>`).join('')}</div></div>
    <div class="field-group"><div class="field-label">Sections to Inspect *</div>
    <div class="section-grid">${sectionBtns||'<span style="color:var(--muted);font-size:12px">Select a bank first</span>'}</div></div>
    <button class="start-btn" id="start-btn" ${canStart()?'':'disabled'}>Start Inspection →</button>
    <div class="pb"></div></div>`;
}

function renderInspect() {
  const c=cl();
  const tabs=state.sections.map(sid=>{
    const lbl=(SECTION_TYPES.find(s=>s.id===sid)||{}).label||sid;
    const done=sectionDone(sid),tot=sectionTotal(sid),isDone=done===tot;
    return `<button class="tab${state.activeSection===sid?' active':''}${isDone&&state.activeSection!==sid?' done':''}" data-tab="${sid}">${isDone&&state.activeSection!==sid?'✓ ':''}${lbl}<span class="cnt">${done}/${tot}</span></button>`;
  }).join('');
  const items=currentItems().map(item=>{
    const data=state.photoData[item.id]||{};
    const photos=data.photos||[];
    const isCompleted=photos.length>0, isExpanded=state.expandedItem===item.id;
    const thumbs=photos.map(p=>`<div class="thumb"><img src="${p.url}"><button class="thumb-del" data-item="${item.id}" data-photo="${p.id}">×</button></div>`).join('');
    const body=isExpanded?`<div class="photo-body">
      ${photos.length>0?`<div class="thumbnails">${thumbs}</div>`:''}
      <div class="capture-row"><button class="cam-btn primary" data-cam="${item.id}">📷 Take Photo</button><button class="cam-btn" data-upload="${item.id}">⬆ Upload</button></div>
      <div class="notes-label">Notes / Caption</div>
      <textarea class="notes-area" rows="2" placeholder="Add caption or notes…" data-notes="${item.id}">${esc(data.note||'')}</textarea>
    </div>`:'';
    return `<div class="photo-item${isCompleted?' completed':''}${item.req?' req-item':''}">
      <div class="photo-header" data-expand="${item.id}">
        <div class="photo-status${isCompleted?' done':''}">${isCompleted?'✓':''}</div>
        <div class="photo-info"><div class="photo-label">${esc(item.label)}${item.req?'<span class="req-badge">Required</span>':''}</div>${item.hint?`<div class="photo-hint">${esc(item.hint)}</div>`:''}</div>
        <div class="photo-count">${photos.length>0?photos.length+' 📷':isExpanded?'▲':'▼'}</div>
      </div>${body}</div>`;
  }).join('');
  return `<div class="section-tabs" style="margin-bottom:16px">${tabs}
    <button class="tab" style="background:rgba(79,142,247,.08);border-color:var(--accent);color:var(--accent)" id="summary-tab">Summary →</button>
  </div>
  ${c?.note?`<div class="bank-banner"><strong>📌 ${esc(bankName())}:</strong> ${esc(c.note)}</div>`:''}
  ${items}<div class="pb"></div>`;
}

function renderSummary() {
  const c=cl(), missing=missingRequired(), tot=totalPhotos(), minReq=c?.photoMin||0;
  const driveConnected=!!googleToken;
  const counts=photoCountByFolder();
  const addr=state.address||'Property';
  const dateStr=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  const sectionRows=state.sections.map(sid=>{
    const lbl=(SECTION_TYPES.find(s=>s.id===sid)||{}).label||sid;
    const done=sectionDone(sid),tot=sectionTotal(sid);
    return `<div class="stat-row"><span class="stat-label">${lbl}</span><span class="stat-val${done===tot?' ok':' warn'}">${done}/${tot}</span></div>`;
  }).join('');

  const missingHtml=missing.length?`<div class="summary-card"><h3>⚠️ Missing Required Photos</h3>${missing.map(m=>`<div class="missing-item">⚠ ${esc(m)}</div>`).join('')}</div>`:'';

  const driveBar=`<div class="drive-status">
    <div class="drive-dot ${isUploading?'uploading':driveConnected?'connected':'disconnected'}"></div>
    <span style="flex:1">${isUploading?'Uploading…':driveConnected?'Google Drive connected':'Not connected to Google Drive'}</span>
    ${!driveConnected&&!isUploading?`<button class="back-btn" onclick="signInGoogle()" style="color:var(--accent);border-color:var(--accent)">Connect</button>`:''}
  </div>`;

  // Folder structure preview
  const folderPreview=`<div class="folder-preview">
    <h3>📁 Drive Folder Structure</h3>
    <div class="folder-root">📁 ${esc(addr)} – ${dateStr}</div>
    <div class="folder-child"><span>📄 inspection-report.txt</span><span class="badge">report</span></div>
    <div class="folder-child"><span>📁 1. Exterior</span><span class="badge">${counts['1. Exterior']} photos</span></div>
    <div class="folder-child"><span>📁 2. Interior</span><span class="badge">${counts['2. Interior']} photos</span></div>
    <div class="folder-child"><span>📁 3. Deferred Maintenance</span><span class="badge">${counts['3. Deferred Maintenance']} photos</span></div>
  </div>`;

  // Upload progress
  const progressHtml = isUploading && uploadSteps.length ? `<div class="upload-progress">
    <h3>Upload Progress</h3>
    ${uploadSteps.map(s=>`<div class="upload-step ${s.status}">
      <span>${s.status==='done'?'✅':s.status==='active'?'⏳':'⬜'}</span>
      <span>${esc(s.label)}</span>
    </div>`).join('')}
  </div>` : '';

  return `<div>
    <div class="summary-header">
      <div class="big-check">${missing.length===0?'✅':'⚠️'}</div>
      <h2>${missing.length===0?'Inspection Complete':'Review Required'}</h2>
      <p>${esc(state.propName||state.address)}</p>
    </div>
    ${driveBar}
    ${folderPreview}
    ${progressHtml}
    <div class="summary-card"><h3>Photo Count</h3>
      <div class="stat-row"><span class="stat-label">Total Photos Captured</span><span class="stat-val${tot>=minReq?' ok':' warn'}">${tot}</span></div>
      <div class="stat-row"><span class="stat-label">Minimum Required</span><span class="stat-val">${minReq}</span></div>
      <div class="stat-row"><span class="stat-label">Items Completed</span><span class="stat-val ok">${completedItems()}/${allItems().length}</span></div>
    </div>
    <div class="summary-card"><h3>Sections</h3>${sectionRows}</div>
    ${missingHtml}
    <div class="summary-card"><h3>Property Info</h3>
      <div class="stat-row"><span class="stat-label">Address</span><span class="stat-val" style="font-size:11px">${esc(state.address)}</span></div>
      <div class="stat-row"><span class="stat-label">Bank</span><span class="stat-val" style="font-size:11px">${esc(bankName())}</span></div>
      <div class="stat-row"><span class="stat-label">Date</span><span class="stat-val" style="font-size:11px">${new Date().toLocaleDateString()}</span></div>
    </div>
    <button class="export-btn green" id="drive-btn" ${isUploading?'disabled':''}>
      ${isUploading?'⏳ Uploading to Drive…':'☁️ Upload to Google Drive'}
    </button>
    <button class="export-btn primary" id="save-btn">💾 Save to Phone</button>
    <button class="export-btn" id="continue-btn">← Continue Inspecting</button>
    <button class="export-btn" id="new-btn">🔄 New Inspection</button>
    <div class="pb"></div>
  </div>`;
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
function bindEvents() {
  const ia=document.getElementById('inp-address');
  if(ia) ia.addEventListener('input',e=>{state.address=e.target.value;const sb=document.getElementById('start-btn');if(sb)sb.disabled=!canStart();});
  const ip=document.getElementById('inp-propname');
  if(ip) ip.addEventListener('input',e=>{state.propName=e.target.value;});
  document.querySelectorAll('[data-bank]').forEach(b=>b.addEventListener('click',()=>{state.bank=b.dataset.bank;state.sections=[];render();}));
  document.querySelectorAll('[data-section]').forEach(b=>b.addEventListener('click',()=>{
    const s=b.dataset.section;
    state.sections=state.sections.includes(s)?state.sections.filter(x=>x!==s):[...state.sections,s];
    render();
  }));
  const sb=document.getElementById('start-btn');
  if(sb) sb.addEventListener('click',()=>{if(!canStart())return;state.activeSection=state.sections[0];state.screen='inspect';render();});
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{state.activeSection=b.dataset.tab;state.expandedItem=null;render();}));
  const st=document.getElementById('summary-tab');
  if(st) st.addEventListener('click',()=>{state.screen='summary';render();});
  document.querySelectorAll('[data-expand]').forEach(el=>el.addEventListener('click',()=>{const id=el.dataset.expand;state.expandedItem=state.expandedItem===id?null:id;render();}));
  document.querySelectorAll('[data-cam]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();pendingItemId=b.dataset.cam;document.getElementById('camera-input').click();}));
  document.querySelectorAll('[data-upload]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();pendingItemId=b.dataset.upload;document.getElementById('upload-input').click();}));
  document.querySelectorAll('[data-notes]').forEach(ta=>{
    ta.addEventListener('input',e=>{const id=ta.dataset.notes;if(!state.photoData[id])state.photoData[id]={photos:[]};state.photoData[id].note=e.target.value;});
    ta.addEventListener('click',e=>e.stopPropagation());
  });
  document.querySelectorAll('.thumb-del').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    state.photoData[b.dataset.item].photos=state.photoData[b.dataset.item].photos.filter(p=>p.id!==b.dataset.photo);
    render();
  }));
  const db=document.getElementById('drive-btn');
  if(db) db.addEventListener('click',uploadToDrive);
  const svb=document.getElementById('save-btn');
  if(svb) svb.addEventListener('click',saveToPhone);
  const cb=document.getElementById('continue-btn');
  if(cb) cb.addEventListener('click',()=>{state.screen='inspect';render();});
  const nb=document.getElementById('new-btn');
  if(nb) nb.addEventListener('click',()=>{state={screen:'setup',bank:null,sections:[],address:'',propName:'',activeSection:null,photoData:{},expandedItem:null};render();});
}

function goBack() {
  state.screen = state.screen==='summary'?'inspect':'setup';
  render();
}

function handlePhotos(files) {
  if(!files.length||!pendingItemId) return;
  const itemId=pendingItemId;
  if(!state.photoData[itemId]) state.photoData[itemId]={photos:[],note:''};
  Array.from(files).forEach(f=>{
    state.photoData[itemId].photos.push({id:Date.now()+''+Math.random(),url:URL.createObjectURL(f),name:f.name});
  });
  state.expandedItem=itemId;
  render();
}

document.getElementById('camera-input').addEventListener('change',function(){handlePhotos(this.files);this.value='';});
document.getElementById('upload-input').addEventListener('change',function(){handlePhotos(this.files);this.value='';});
window.addEventListener('load',()=>setTimeout(initGoogleAuth,800));
render();
</script>
